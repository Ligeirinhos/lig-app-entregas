            font-family: 'Segoe UI', Arial, sans-serif;

            background: #1a1a1a;

            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;

        .sync-status { font-size: 10px; display: flex; align-items: center; gap: 5px; }

        .sync-status.off { color: #f59e0b; }
        
        .app-content { padding: 10px; display: none; }
        .app-content.active { display: block; }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1a1a1a; border-top: 2px solid #FFD700;
            display: flex; z-index: 100; height: 60px;

            flex: 1; display: flex; flex-direction: column;

            cursor: pointer; border: none; background: transparent;

            padding: 8px 14px; border-radius: 20px; font-weight: 600;
            cursor: pointer; font-size: 11px; border: none;
            white-space: nowrap; font-family: inherit;
        }
        .btn-gold { background: #FFD700; color: #1a1a1a; }
        .btn-outline { background: transparent; border: 2px solid #FFD700; color: #FFD700; }
        .btn-red { background: transparent; border: 2px solid #dc2626; color: #dc2626; }
        .btn-sm { padding: 5px 10px; font-size: 10px; }
        
        .card { background: #2a2a2a; border-radius: 12px; padding: 12px; border: 1px solid #333; margin-bottom: 8px; }
        .card-title { font-size: 12px; color: #FFD700; margin-bottom: 6px; font-weight: bold; text-transform: uppercase; }
        .section-title { color: #FFD700; margin: 12px 0 8px 0; padding-bottom: 6px; border-bottom: 2px solid #FFD700; font-weight: 600; font-size: 14px; }
        .empty-state { text-align: center; padding: 30px; color: #888; }
        
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        table th { background: #1a1a1a; color: #FFD700; padding: 6px 3px; font-size: 9px; text-align: center; }
        table td { padding: 5px 3px; text-align: center; border-bottom: 1px solid #333; }
        
        input, select, textarea {
            background: #1a1a1a; border: 2px solid #444; border-radius: 6px;
            padding: 6px; color: #fff; font-size: 12px; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: #FFD700; outline: none; }
        textarea { width: 100%; height: 150px; resize: vertical; font-family: 'Consolas', monospace; font-size: 11px; }
        
        .mini-card { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .mini-card .value { font-size: 20px; font-weight: bold; color: #FFD700; }
        .mini-card .label { font-size: 9px; color: #aaa; text-transform: uppercase; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 6px; }
        
        .cell-highlight { background: #2a2000; font-weight: bold; color: #FFD700; }
        .total-col { background: #1a1a1a !important; color: #FFD700 !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-header">

        <h1>🏍️ Ligeirinho's</h1>

<!-- SEÇÃO ENTREGADORES -->
<div class="app-content active" id="sec-entr">

        <button class="btn btn-outline btn-sm" onclick="resetarDiaRest()">🗑️</button>
    </div>
    <div style="display:flex;gap:4px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
        <button class="btn btn-sm btn-outline" onclick="mudarDiaRest(-1)">⬅️</button>
        <input type="date" id="data-rest" onchange="renderRest()" style="width:130px;">
        <button class="btn btn-sm btn-outline" onclick="mudarDiaRest(1)">➡️</button>
        <button class="btn btn-sm btn-outline" onclick="dataAtualRest=new Date();renderRest();">📅</button>

<!-- SEÇÃO PROCESSADOR -->

[1/5 07:43] Raulzito: 👍"></textarea>

<!-- MENU INFERIOR -->
<div class="bottom-nav">
    <button class="nav-item active" onclick="nav('entr')"><span class="icon">👤</span>Entreg.</button>
    <button class="nav-item" onclick="nav('rest')"><span class="icon">🍔</span>Restaur.</button>
    <button class="nav-item" onclick="nav('proc')"><span class="icon">🤖</span>Process.</button>
    <button class="nav-item" onclick="nav('dash-entr')"><span class="icon">🏆</span>Dash.</button>
    <button class="nav-item" onclick="nav('log')"><span class="icon">📋</span>Log</button>

<script>
// ============ FIREBASE ============
firebase.initializeApp({
    apiKey: "AIzaSyBNACpsgB4XFn2FuiRQbG0Nbd-958aAKbI",
    authDomain: "ligeirinho-s.firebaseapp.com",
    projectId: "ligeirinho-s",
    storageBucket: "ligeirinho-s.firebasestorage.app",
    messagingSenderId: "10630838120",
    appId: "1:10630838120:web:7194dfdad262b5c9a288dd"
});
const db = firebase.firestore();

// ============ DADOS ============
const H = ['7h','8h','9h','10h','11h','12h','13h','14h','15h','16h','17h','18h','19h','20h','21h','22h'];
let listaE = [], listaR = [], dadosE = {}, dadosR = {}, logE = [];
let dataE = new Date(), dataR = new Date();
let online = navigator.onLine;
let _proc = [];

window.addEventListener('online', () => { online = true; updateSync(); });
window.addEventListener('offline', () => { online = false; updateSync(); });

function updateSync() {
    const el = document.getElementById('sync-status');
    if (online) { el.innerHTML = '<span>☁️</span> Online'; el.className = 'sync-status on'; }
    else { el.innerHTML = '<span>📡</span> Offline'; el.className = 'sync-status off'; }
}

function fmt(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// ============ FIREBASE HELPERS ============
async function fbSave(col, doc, data) {
    if (!online) { localStorage.setItem(`fb_${col}_${doc}`, JSON.stringify(data)); return; }
    try { await db.collection(col).doc(doc).set(data, { merge: true }); }
    catch(e) { localStorage.setItem(`fb_${col}_${doc}`, JSON.stringify(data)); }
}

async function fbLoad(col) {
    if (!online) {
        const cached = localStorage.getItem(`fb_${col}_dados`);
        return cached ? JSON.parse(cached).data : null;
    }
    try {
        const snap = await db.collection(col).doc('dados').get();
        if (snap.exists) {
            const d = snap.data();
            localStorage.setItem(`fb_${col}_dados`, JSON.stringify(d));
            return d;
        }
        return null;
    } catch(e) { return null; }
}

// ============ NAVEGAÇÃO ============
const secoes = { entr: 'sec-entr', rest: 'sec-rest', proc: 'sec-proc', 'dash-entr': 'sec-dash-entr', log: 'sec-log' };

function nav(sec) {
    document.querySelectorAll('.app-content').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(secoes[sec]).classList.add('active');
    document.querySelectorAll('.nav-item')[Object.keys(secoes).indexOf(sec)].classList.add('active');
    if (sec === 'entr') renderEntr();
    if (sec === 'rest') renderRest();
    if (sec === 'dash-entr') renderDashEntr();
    if (sec === 'log') renderLog('entregador');
}

// ============ PLANILHA ENTREGADORES ============
function mudarDiaEntr(d) { dataE.setDate(dataE.getDate() + d); renderEntr(); }

async function renderEntr() {
    document.getElementById('data-entr').value = fmt(dataE);
    const chave = fmt(dataE);
    if (!dadosE[chave]) dadosE[chave] = {};
    listaE.sort().forEach(n => { if (!dadosE[chave][n]) dadosE[chave][n] = new Array(16).fill(0); });
    
    let html = '<table><thead><tr><th>Entregador</th>';
    H.forEach(h => html += `<th>${h}</th>`);
    html += '<th>Tot</th></tr></thead><tbody>';
    
    listaE.sort().forEach(nome => {
        const linha = dadosE[chave][nome] || new Array(16).fill(0);
        html += `<tr><td><strong>${nome}</strong> <span onclick="remEntr('${nome}')" style="color:#dc2626;cursor:pointer;">✖️</span></td>`;
        let s = 0;
        H.forEach((_, i) => {
            const v = linha[i] || 0; s += v;
            html += `<td><input type="number" min="0" value="${v||''}" placeholder="0" style="width:38px;padding:3px;text-align:center;" onchange="celEntr('${nome}',${i},this.value)"></td>`;
        });
        html += `<td style="color:#FFD700;font-weight:bold;">${s}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('tabela-entr').innerHTML = html;
}

function celEntr(nome, idx, val) {
    const chave = fmt(dataE);
    const v = parseInt(val) || 0;
    if (!dadosE[chave]) dadosE[chave] = {};
    if (!dadosE[chave][nome]) dadosE[chave][nome] = new Array(16).fill(0);
    dadosE[chave][nome][idx] = v;
    fbSave('entregadores', 'dados', { lista: listaE, dados: dadosE, ts: Date.now() });
    renderEntr();
}

function addEntr() {
    const nome = document.getElementById('novo-entr').value.trim();
    if (!nome || listaE.includes(nome)) return;
    listaE.push(nome);
    document.getElementById('novo-entr').value = '';
    fbSave('entregadores', 'dados', { lista: listaE, dados: dadosE, ts: Date.now() });
    renderEntr();
}

function remEntr(nome) {
    if (!confirm('Remover '+nome+'?')) return;
    listaE = listaE.filter(e => e !== nome);
    Object.keys(dadosE).forEach(d => delete dadosE[d][nome]);
    fbSave('entregadores', 'dados', { lista: listaE, dados: dadosE, ts: Date.now() });
    renderEntr();
}

function resetarDiaEntr() {
    if (!confirm('Zerar dia?')) return;
    const chave = fmt(dataE);
    if (!dadosE[chave]) dadosE[chave] = {};
    listaE.forEach(n => dadosE[chave][n] = new Array(16).fill(0));
    fbSave('entregadores', 'dados', { lista: listaE, dados: dadosE, ts: Date.now() });
    renderEntr();
}

// ============ PLANILHA RESTAURANTES ============
function mudarDiaRest(d) { dataR.setDate(dataR.getDate() + d); renderRest(); }

async function renderRest() {
    document.getElementById('data-rest').value = fmt(dataR);
    const chave = fmt(dataR);
    if (!dadosR[chave]) dadosR[chave] = {};
    listaR.sort().forEach(n => { if (!dadosR[chave][n]) dadosR[chave][n] = new Array(16).fill(0); });
    
    let html = '<table><thead><tr><th>Restaurante</th>';
    H.forEach(h => html += `<th>${h}</th>`);
    html += '<th>Tot</th></tr></thead><tbody>';
    
    listaR.sort().forEach(nome => {
        const linha = dadosR[chave][nome] || new Array(16).fill(0);
        html += `<tr><td><strong>${nome}</strong> <span onclick="remRest('${nome}')" style="color:#dc2626;cursor:pointer;">✖️</span></td>`;
        let s = 0;
        H.forEach((_, i) => {
            const v = linha[i] || 0; s += v;
            html += `<td><input type="number" min="0" value="${v||''}" placeholder="0" style="width:38px;padding:3px;" onchange="celRest('${nome}',${i},this.value)"></td>`;
        });
        html += `<td style="color:#FFD700;font-weight:bold;">${s}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('tabela-rest').innerHTML = html;
}

function celRest(nome, idx, val) {
    const chave = fmt(dataR);
    const v = parseInt(val) || 0;
    if (!dadosR[chave]) dadosR[chave] = {};
    if (!dadosR[chave][nome]) dadosR[chave][nome] = new Array(16).fill(0);
    dadosR[chave][nome][idx] = v;
    fbSave('restaurantes', 'dados', { lista: listaR, dados: dadosR, ts: Date.now() });
    renderRest();
}

function addRest() {
    const nome = document.getElementById('novo-rest').value.trim();
    if (!nome || listaR.includes(nome)) return;
    listaR.push(nome);
    document.getElementById('novo-rest').value = '';
    fbSave('restaurantes', 'dados', { lista: listaR, dados: dadosR, ts: Date.now() });
    renderRest();
}

function remRest(nome) {
    if (!confirm('Remover '+nome+'?')) return;
    listaR = listaR.filter(e => e !== nome);
    Object.keys(dadosR).forEach(d => delete dadosR[d][nome]);
    fbSave('restaurantes', 'dados', { lista: listaR, dados: dadosR, ts: Date.now() });
    renderRest();
}

function resetarDiaRest() {
    if (!confirm('Zerar dia?')) return;
    const chave = fmt(dataR);
    if (!dadosR[chave]) dadosR[chave] = {};
    listaR.forEach(n => dadosR[chave][n] = new Array(16).fill(0));
    fbSave('restaurantes', 'dados', { lista: listaR, dados: dadosR, ts: Date.now() });
    renderRest();
}

// ============ PROCESSADOR ============
function processar() {
    const texto = document.getElementById('msg-wp').value.trim();
    if (!texto) return;
    
    const linhas = texto.split('\n').filter(l => l.trim());
    const regex = /^\[(\d{1,2}\/\d{1,2}\s+\d{1,2}:\d{2})\]\s+([^:]+):\s*(.+)$/;
    let ultR = null, ultH = null, ja = [];
    _proc = [];
    
    const limpar = t => t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ');
    
    linhas.forEach(l => {
        const m = l.match(regex); if (!m) return;
        const hora = m[1].split(' ')[1], nome = m[2].trim(), msg = m[3].trim();
        const like = /^👍/.test(msg) || /^✅/.test(msg);
        
        if (like && ultR) {
            const e = listaE.find(x => limpar(x) === limpar(nome) || limpar(nome).includes(limpar(x)));
            if (e && !ja.includes(e)) { _proc.push({ h: ultH, r: ultR, e }); ja.push(e); }
        } else if (!like) {
            const r = listaR.find(x => limpar(x) === limpar(nome) || limpar(nome).includes(limpar(x)));
            if (r) { ultR = r; ultH = hora; ja = []; } else { ultR = null; }
        }
    });
    
    let html = `<div class="section-title">✅ ${_proc.length} entregas</div>`;
    if (_proc.length > 0) {
        html += '<table><thead><tr><th>#</th><th>Hora</th><th>Restaurante</th><th>Entregador</th></tr></thead><tbody>';
        _proc.forEach((e, i) => html += `<tr><td>${i+1}</td><td>${e.h}</td><td>${e.r}</td><td><strong>${e.e}</strong></td></tr>`);
        html += '</tbody></table>';
        html += `<br><button class="btn btn-gold" onclick="salvarProc()">💾 Salvar com Precisão</button>`;
    }
    document.getElementById('resultado-proc').innerHTML = html;
}

async function salvarProc() {
    if (!_proc.length) return;
    const hoje = fmt(new Date());
    
    _proc.forEach(e => {
        const idx = parseInt(e.h.split(':')[0]) - 7;
        if (idx < 0 || idx >= 16) return;
        logE.push({ data: hoje, hora: e.h, restaurante: e.r, entregador: e.e });
        if (!dadosE[hoje]) dadosE[hoje] = {};
        if (!dadosE[hoje][e.e]) dadosE[hoje][e.e] = new Array(16).fill(0);
        dadosE[hoje][e.e][idx]++;
        if (!dadosR[hoje]) dadosR[hoje] = {};
        if (!dadosR[hoje][e.r]) dadosR[hoje][e.r] = new Array(16).fill(0);
        dadosR[hoje][e.r][idx]++;
    });
    
    await fbSave('log_entregas', 'dados', { dados: logE, ts: Date.now() });
    await fbSave('entregadores', 'dados', { lista: listaE, dados: dadosE, ts: Date.now() });
    await fbSave('restaurantes', 'dados', { lista: listaR, dados: dadosR, ts: Date.now() });
    
    alert(`✅ ${_proc.length} entregas salvas!`);
    _proc = [];
    document.getElementById('resultado-proc').innerHTML = '<div class="empty-state">✅ Salvo!</div>';
}

// ============ DASHBOARD ENTREGADORES ============
async function renderDashEntr() {
    const periodo = document.getElementById('dash-periodo-entr').value;
    const di = document.getElementById('dash-inicio-entr').value;
    const df = document.getElementById('dash-fim-entr').value;
    
    let fd = {}, datas = [];
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    
    Object.entries(dadosE).forEach(([data, dia]) => {
        if (di || df) { if (di && data < di) return; if (df && data > df) return; }
        else {
            const [a,m,d] = data.split('-').map(Number);
            const diff = Math.floor((hoje - new Date(a,m-1,d)) / 86400000);
            if (periodo === 'hoje' && diff !== 0) return;
            if (periodo === 'semana' && (diff < 0 || diff >= 7)) return;
        }
        fd[data] = dia; datas.push(data);
    });
    
    let total = 0; const pe = {};
    Object.values(fd).forEach(dia => {
        listaE.forEach(n => {
            if (dia[n]) { const t = dia[n].reduce((a,b)=>a+b,0); total += t; pe[n] = (pe[n]||0) + t; }
        });
    });
    
    const ranking = Object.entries(pe).sort((a,b)=>b[1]-a[1]);
    
    let html = '<div class="grid-4">';
    html += `<div class="mini-card"><div class="value">${total}</div><div class="label">Total</div></div>`;
    html += `<div class="mini-card"><div class="value">${Object.keys(pe).length}</div><div class="label">Entreg.</div></div>`;
    html += `<div class="mini-card"><div class="value">${datas.length}</div><div class="label">Dias</div></div>`;
    html += `<div class="mini-card"><div class="value">${datas.length>0?(total/datas.length).toFixed(1):'0'}</div><div class="label">Média</div></div>`;
    html += '</div>';
    
    if (ranking.length > 0) {
        html += '<div class="section-title">🏆 Ranking</div>';
        ranking.forEach(([n, t], i) => {
            html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #333;">`;
            html += `<span>${['🥇','🥈','🥉'][i]||`${i+1}º`} ${n}</span><span style="color:#FFD700;">${t}</span></div>`;
        });
    }
    
    document.getElementById('dash-entr-conteudo').innerHTML = html;
    
    // Gráfico simples
    setTimeout(() => {
        let canvas = document.getElementById('chart-dash');
        if (!canvas) {
            document.getElementById('dash-entr-conteudo').insertAdjacentHTML('beforeend', '<div class="card" style="margin-top:10px;"><canvas id="chart-dash" height="200"></canvas></div>');
            canvas = document.getElementById('chart-dash');
        }
        if (canvas && ranking.length > 0) {
            const ctx = canvas.getContext('2d');
            const existente = Chart.getChart('chart-dash');
            if (existente) existente.destroy();
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ranking.slice(0,5).map(r=>r[0]),
                    datasets: [{ data: ranking.slice(0,5).map(r=>r[1]), backgroundColor: ['#FFD700','#3b82f6','#dc2626','#22c55e','#f59e0b'] }]
                },
                options: { responsive: true }
            });
        }
    }, 300);
}

// ============ LOG ============
async function renderLog(modo) {
    w._logModo = modo;
    const di = document.getElementById('log-inicio').value;
    const df = document.getElementById('log-fim').value;
    
    let log = [...logE];
    if (di) log = log.filter(e => e.data >= di);
    if (df) log = log.filter(e => e.data <= df);
    
    if (!log.length) {
        document.getElementById('log-conteudo').innerHTML = '<div class="empty-state">📭 Nenhum registro</div>';
        return;
    }
    
    if (modo === 'detalhado') {
        log.sort((a,b) => b.data.localeCompare(a.data) || b.hora.localeCompare(a.hora));
        let html = '<table><thead><tr><th>#</th><th>Data</th><th>Hora</th><th>Restaurante</th><th>Entreg.</th><th></th></tr></thead><tbody>';
        log.forEach((e, i) => {
            const idx = logE.findIndex(x => x.data===e.data&&x.hora===e.hora&&x.restaurante===e.restaurante&&x.entregador===e.entregador);
            html += `<tr><td>${i+1}</td><td>${e.data.split('-').reverse().join('/')}</td><td>${e.hora}</td><td>${e.restaurante}</td><td><strong>${e.entregador}</strong></td><td><span onclick="remLog(${idx})" style="color:#dc2626;cursor:pointer;">✖️</span></td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('log-conteudo').innerHTML = html;
    } else if (modo === 'entregador') {
        const ent = [...new Set(log.map(e=>e.entregador))].sort();
        const rest = [...new Set(log.map(e=>e.restaurante))].sort();
        let html = '<table><thead><tr><th>Entregador</th>';
        rest.forEach(r => html += `<th>${r.substring(0,10)}</th>`);
        html += '<th>Tot</th></tr></thead><tbody>';
        ent.forEach(e => {
            html += `<tr><td><strong>${e}</strong></td>`; let t = 0;
            rest.forEach(r => { const v = log.filter(x=>x.entregador===e&&x.restaurante===r).length; t += v; html += `<td class="${v>0?'cell-highlight':''}">${v||'-'}</td>`; });
            html += `<td class="total-col">${t}</td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('log-conteudo').innerHTML = html;
    }
}

async function remLog(idx) {
    if (!confirm('Remover?')) return;
    logE.splice(idx, 1);
    await fbSave('log_entregas', 'dados', { dados: logE, ts: Date.now() });
    renderLog(w._logModo||'entregador');
}

async function limparLog() {
    if (!confirm('⚠️ Apagar TODO o log?')) return;
    logE = [];
    await fbSave('log_entregas', 'dados', { dados: [], ts: Date.now() });
    renderLog('entregador');
}

// ============ INIT ============
async function init() {
    updateSync();
    
    // Carregar dados do Firebase
    const fbE = await fbLoad('entregadores');
    if (fbE) { listaE = fbE.lista || []; dadosE = fbE.dados || {}; }
    
    const fbR = await fbLoad('restaurantes');
    if (fbR) { listaR = fbR.lista || []; dadosR = fbR.dados || {}; }
    
    const fbL = await fbLoad('log_entregas');
    if (fbL) { logE = fbL.dados || []; }
    
    renderEntr();
}

window.onload = init;
</script>
