    <style>

        .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #333; }

        input, select, textarea {
            background: #1a1a1a; border: 2px solid #444; border-radius: 6px;
            padding: 6px; color: #fff; font-size: 12px; font-family: inherit;

<script>
// ============ FIREBASE ============
firebase.initializeApp({
    apiKey: "AIzaSyBNACpsgB4XFn2FuiRQbG0Nbd-958aAKbI",
    authDomain: "ligeirinho-s.firebaseapp.com",
    projectId: "ligeirinho-s",
    storageBucket: "ligeirinho-s.firebasestorage.app",
    messagingSenderId: "10630838120",
    appId: "1:10630838120:web:7194dfdad262b5c9a288dd"
});
const db = firebase.firestore();

// ============ DADOS ============
const H = ['7h','8h','9h','10h','11h','12h','13h','14h','15h','16h','17h','18h','19h','20h','21h','22h'];
const TURNOS = {
    '🌅 Manhã': { indices: [0,1,2,3], cor: '#f59e0b' },
    '☀️ Almoço': { indices: [4,5,6], cor: '#ef4444' },
    '🌤️ Tarde': { indices: [7,8,9,10], cor: '#3b82f6' },
    '🌙 Noite': { indices: [11,12,13,14,15], cor: '#8b5cf6' }
};

let listaE = [], listaR = [], dadosE = {}, dadosR = {}, logE = [];
let dataE = new Date(), dataR = new Date(), dataLog = new Date();
let online = navigator.onLine;
let _proc = [];

window.addEventListener('online', () => { online = true; updateSync(); });
window.addEventListener('offline', () => { online = false; updateSync(); });

function updateSync() {
    const el = document.getElementById('sync-status');
    el.innerHTML = online ? '<span>☁️</span> Online' : '<span>📡</span> Offline';
    el.className = 'sync-status ' + (online ? 'on' : 'off');
}
function fmt(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function horaToIdx(hora) {
    let h = parseInt(hora.split(':')[0]);
    if (h < 7) h = 7;
    if (h > 22) h = 22;
    return h - 7;
}

// ============ FIREBASE HELPERS ============
async function fbSave(col, doc, data) {
    localStorage.setItem(`fb_${col}_${doc}`, JSON.stringify(data));
    if (!online) return;
    try { await db.collection(col).doc(doc).set(data, { merge: true }); } catch(e) {}
}

async function fbLoad(col) {
    if (online) {
        try {
            const snap = await db.collection(col).doc('dados').get();
            if (snap.exists) {
                const d = snap.data();
                localStorage.setItem(`fb_${col}_dados`, JSON.stringify(d));
                return d;
            }
        } catch(e) {}
    }
    const c = localStorage.getItem(`fb_${col}_dados`);
    return c ? JSON.parse(c) : null;
}

// ============ NAVEGAÇÃO ============
const secoes = { entr:'sec-entr', rest:'sec-rest', proc:'sec-proc', 'dash-entr':'sec-dash-entr', 'dash-rest':'sec-dash-rest', log:'sec-log' };
const navLabels = ['entr','rest','proc','dash-entr','dash-rest','log'];

function nav(sec) {
    document.querySelectorAll('.app-content').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(secoes[sec]).classList.add('active');
    document.querySelectorAll('.nav-item')[navLabels.indexOf(sec)].classList.add('active');
    if (sec === 'entr') renderEntr();
    if (sec === 'rest') renderRest();
    if (sec === 'dash-entr') renderDashEntr();
    if (sec === 'dash-rest') renderDashRest();
    if (sec === 'log') { dataLog = new Date(); renderLog('entregador'); }
}

// ============ PLANILHA ENTREGADORES ============
function mudarDiaEntr(d) { dataE.setDate(dataE.getDate() + d); renderEntr(); }
function renderEntr() {
    document.getElementById('data-entr').value = fmt(dataE);
    const chave = fmt(dataE);
    if (!dadosE[chave]) dadosE[chave] = {};
    listaE.sort().forEach(n => { if (!dadosE[chave][n]) dadosE[chave][n] = new Array(16).fill(0); });
    
    let html = '<table><thead><tr><th class="sticky-col">Entregador</th>';
    H.forEach(h => html += `<th>${h}</th>`);
    html += '<th>Tot</th></tr></thead><tbody>';
    let totaisHora = new Array(16).fill(0);
    
    listaE.sort().forEach(nome => {
        const linha = dadosE[chave][nome] || new Array(16).fill(0);
        html += `<tr><td class="sticky-col"><strong>${nome}</strong> <span onclick="remEntr('${nome}')" style="color:#dc2626;cursor:pointer;font-size:10px;">✖️</span></td>`;
        let s = 0;
        H.forEach((_, i) => { const v = linha[i]||0; s += v; totaisHora[i] += v;
            html += `<td><input type="number" min="0" value="${v||''}" placeholder="0" style="width:38px;padding:3px;text-align:center;" onchange="celEntr('${nome}',${i},this.value)"></td>`; });
        html += `<td style="color:#FFD700;font-weight:bold;">${s}</td></tr>`;
    });
    
    html += '<tr class="total-row"><td class="sticky-col"><strong>TOTAL/HORA</strong></td>';
    let sg = 0; totaisHora.forEach(v => { html += `<td>${v||'-'}</td>`; sg += v; });
    html += `<td class="total-col">${sg}</td></tr></tbody></table>`;
    document.getElementById('tabela-entr').innerHTML = html;
}

function celEntr(nome, idx, val) {
    const chave = fmt(dataE); const v = parseInt(val)||0;
    if (!dadosE[chave]) dadosE[chave] = {};
    if (!dadosE[chave][nome]) dadosE[chave][nome] = new Array(16).fill(0);
    dadosE[chave][nome][idx] = v;
    fbSave('entregadores', 'dados', { lista: listaE, dados: dadosE, ts: Date.now() });
}
function addEntr() { const n = document.getElementById('novo-entr').value.trim(); if (!n || listaE.includes(n)) return; listaE.push(n); document.getElementById('novo-entr').value=''; fbSave('entregadores','dados',{lista:listaE,dados:dadosE,ts:Date.now()}); renderEntr(); }
function remEntr(nome) { if (!confirm('Remover '+nome+'?')) return; listaE = listaE.filter(e=>e!==nome); Object.keys(dadosE).forEach(d=>delete dadosE[d][nome]); fbSave('entregadores','dados',{lista:listaE,dados:dadosE,ts:Date.now()}); renderEntr(); }
function resetarDiaEntr() { if (!confirm('Zerar dia?')) return; const c=fmt(dataE); if(!dadosE[c])dadosE[c]={}; listaE.forEach(n=>dadosE[c][n]=new Array(16).fill(0)); fbSave('entregadores','dados',{lista:listaE,dados:dadosE,ts:Date.now()}); renderEntr(); }

// ============ PLANILHA ESTABELECIMENTOS ============
function mudarDiaRest(d) { dataR.setDate(dataR.getDate() + d); renderRest(); }
function renderRest() {
    document.getElementById('data-rest').value = fmt(dataR);
    const chave = fmt(dataR);
    if (!dadosR[chave]) dadosR[chave] = {};
    listaR.sort().forEach(n => { if (!dadosR[chave][n]) dadosR[chave][n] = new Array(16).fill(0); });
    
    let html = '<table><thead><tr><th class="sticky-col">Estabelecimento</th>';
    H.forEach(h => html += `<th>${h}</th>`);
    html += '<th>Tot</th></tr></thead><tbody>';
    let totaisHora = new Array(16).fill(0);
    
    listaR.sort().forEach(nome => {
        const linha = dadosR[chave][nome] || new Array(16).fill(0);
        html += `<tr><td class="sticky-col"><strong>${nome}</strong> <span onclick="remRest('${nome}')" style="color:#dc2626;cursor:pointer;font-size:10px;">✖️</span></td>`;
        let s = 0;
        H.forEach((_, i) => { const v = linha[i]||0; s += v; totaisHora[i] += v;
            html += `<td><input type="number" min="0" value="${v||''}" placeholder="0" style="width:38px;padding:3px;" onchange="celRest('${nome}',${i},this.value)"></td>`; });
        html += `<td style="color:#FFD700;font-weight:bold;">${s}</td></tr>`;
    });
    
    html += '<tr class="total-row"><td class="sticky-col"><strong>TOTAL/HORA</strong></td>';
    let sg = 0; totaisHora.forEach(v => { html += `<td>${v||'-'}</td>`; sg += v; });
    html += `<td class="total-col">${sg}</td></tr></tbody></table>`;
    document.getElementById('tabela-rest').innerHTML = html;
}

function celRest(nome, idx, val) {
    const chave = fmt(dataR); const v = parseInt(val)||0;
    if (!dadosR[chave]) dadosR[chave] = {};
    if (!dadosR[chave][nome]) dadosR[chave][nome] = new Array(16).fill(0);
    dadosR[chave][nome][idx] = v;
    fbSave('restaurantes', 'dados', { lista: listaR, dados: dadosR, ts: Date.now() });
}
function addRest() { const n = document.getElementById('novo-rest').value.trim(); if (!n || listaR.includes(n)) return; listaR.push(n); document.getElementById('novo-rest').value=''; fbSave('restaurantes','dados',{lista:listaR,dados:dadosR,ts:Date.now()}); renderRest(); }
function remRest(nome) { if (!confirm('Remover '+nome+'?')) return; listaR = listaR.filter(e=>e!==nome); Object.keys(dadosR).forEach(d=>delete dadosR[d][nome]); fbSave('restaurantes','dados',{lista:listaR,dados:dadosR,ts:Date.now()}); renderRest(); }
function resetarDiaRest() { if (!confirm('Zerar dia?')) return; const c=fmt(dataR); if(!dadosR[c])dadosR[c]={}; listaR.forEach(n=>dadosR[c][n]=new Array(16).fill(0)); fbSave('restaurantes','dados',{lista:listaR,dados:dadosR,ts:Date.now()}); renderRest(); }

// ============ PROCESSADOR ============
function processar() {
    const texto = document.getElementById('msg-wp').value.trim();
    if (!texto) return;
    const linhas = texto.split('\n').filter(l => l.trim());
    const regex = /^\[(\d{1,2}\/\d{1,2},?\s+\d{1,2}:\d{2})\]\s+([^:]+):\s*(.+)$/;
    let ultR = null, ultH = null, ja = [];
    _proc = [];
    const limpar = t => t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ');
    
    linhas.forEach(l => {
        const m = l.match(regex); if (!m) return;
        const hora = m[1].split(/[,\s]+/).pop();
        const nome = m[2].trim();
        const msg = m[3].trim();
        const like = /^👍/.test(msg) || /^✅/.test(msg);
        
        if (like && ultR) {
            const e = listaE.find(x => limpar(x) === limpar(nome) || limpar(nome).includes(limpar(x)));
            if (e && !ja.includes(e)) { _proc.push({ h: ultH, r: ultR, e }); ja.push(e); }
        } else if (!like) {
            const r = listaR.find(x => limpar(x) === limpar(nome) || limpar(nome).includes(limpar(x)));
            if (r) { ultR = r; ultH = hora; ja = []; } else { ultR = null; }
        }
    });
    
    renderResultadoProc();
}

function renderResultadoProc() {
    let html = `<div class="section-title">✅ ${_proc.length} entregas reconhecidas</div>`;
    if (_proc.length > 0) {
        html += '<table><thead><tr><th>#</th><th>Hora</th><th>Estabelecimento</th><th>Entregador</th></tr></thead><tbody>';
        _proc.forEach((e, i) => html += `<tr><td>${i+1}</td><td>${e.h}</td><td>${e.r}</td><td><strong>${e.e}</strong></td></tr>`);
        html += '</tbody></table><br><button class="btn btn-gold" onclick="salvarProc()">💾 Salvar com Precisão</button>';
    }
    document.getElementById('resultado-proc').innerHTML = html;
}

function novaAnalise() { document.getElementById('msg-wp').value = ''; _proc = []; document.getElementById('resultado-proc').innerHTML = ''; }

async function salvarProc() {
    if (!_proc.length) return;
    const hoje = fmt(new Date());
    
    _proc.forEach(e => {
        const idx = horaToIdx(e.h);
        logE.push({ data: hoje, hora: e.h, restaurante: e.r, entregador: e.e });
        if (!dadosE[hoje]) dadosE[hoje] = {};
        if (!dadosE[hoje][e.e]) dadosE[hoje][e.e] = new Array(16).fill(0);
        dadosE[hoje][e.e][idx]++;
        if (!dadosR[hoje]) dadosR[hoje] = {};
        if (!dadosR[hoje][e.r]) dadosR[hoje][e.r] = new Array(16).fill(0);
        dadosR[hoje][e.r][idx]++;
    });
    
    await fbSave('log_entregas', 'dados', { dados: logE, ts: Date.now() });
    await fbSave('entregadores', 'dados', { lista: listaE, dados: dadosE, ts: Date.now() });
    await fbSave('restaurantes', 'dados', { lista: listaR, dados: dadosR, ts: Date.now() });
    
    alert(`✅ ${_proc.length} entregas salvas em ${hoje}!`);
    _proc = [];
    document.getElementById('resultado-proc').innerHTML = '<div class="empty-state">✅ Salvo!</div>';
}

// ============ FILTRO DATAS ============
function filtrarDatas(fonte, di, df, periodo) {
    let fd = {}, datas = [];
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    Object.entries(fonte).forEach(([data, dia]) => {
        if (di || df) { if (di && data < di) return; if (df && data > df) return; }
        else {
            const [a,m,d] = data.split('-').map(Number);
            const diff = Math.floor((hoje - new Date(a,m-1,d)) / 86400000);
            if (periodo === 'hoje' && diff !== 0) return;
            if (periodo === 'semana' && (diff < 0 || diff >= 7)) return;
        }
        fd[data] = dia; datas.push(data);
    });
    return { fd, datas };
}

// ============ NAVEGAÇÃO DASHBOARDS ============
function mudarDiaDashEntr(delta) {
    const inpIni = document.getElementById('dash-inicio-entr');
    const inpFim = document.getElementById('dash-fim-entr');
    const hoje = new Date();
    
    // Se não há data definida, começa de hoje
    if (!inpIni.value || !inpFim.value) {
        inpIni.value = fmt(hoje);
        inpFim.value = fmt(hoje);
    }
    
    // Ajusta ambas as datas
    const partes = inpIni.value.split('-');
    const d = new Date(partes[0], partes[1]-1, partes[2]);
    d.setDate(d.getDate() + delta);
    const novaData = fmt(d);
    inpIni.value = novaData;
    inpFim.value = novaData;
    
    // Remove período pré-definido
    document.getElementById('dash-periodo-entr').value = '';
    renderDashEntr();
}

function mudarDiaDashRest(delta) {

        listaE.forEach(n => {

    const ativos = Object.values(pe).filter(v => v > 0).length;
    
    document.getElementById('ativos-entr').innerHTML = `👤 ${ativos} entregadores ativos • 📅 ${datas.length} dia(s) • 📦 ${total} entregas`;
    
    let html = '<div class="grid-4">';
    html += `<div class="mini-card"><div class="value">${total}</div><div class="label">Total</div></div>`;
    html += `<div class="mini-card"><div class="value">${ativos}</div><div class="label">Ativos</div></div>`;
    html += `<div class="mini-card"><div class="value">${datas.length}</div><div class="label">Dias</div></div>`;
    html += `<div class="mini-card"><div class="value">${melhorTurno}</div><div class="label">Melhor Turno</div></div>`;
    html += '</div>';
    
    html += '<div class="section-title">🕐 Entregas por Turno</div><div class="grid-4">';
    Object.entries(pt).forEach(([t, v]) => html += `<div class="mini-card" style="border-left:4px solid ${TURNOS[t].cor};"><div class="value">${v}</div><div class="label">${t}</div></div>`);
    html += '</div>';
    
    if (ranking.length > 0) {
        html += '<div class="section-title">🏆 Ranking</div>';
        ranking.slice(0,5).forEach(([n, t], i) => {
            html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #333;">`;
            html += `<span>${['🥇','🥈','🥉'][i]||`${i+1}º`} ${n}</span><span style="color:#FFD700;">${t}</span></div>`;
        });
    }
    
    html += '<div class="section-title">📊 Por Horário</div><div class="table-wrap"><table><thead><tr><th>Hora</th><th>Turno</th><th>Total</th><th>Média</th></tr></thead><tbody>';
    H.forEach((h, i) => {
        let tn = '', tc = '';
        Object.entries(TURNOS).forEach(([t, c]) => { if (c.indices.includes(i)) { tn = t; tc = c.cor; } });
        html += `<tr><td><strong>${h}</strong></td><td><span style="color:${tc};font-weight:600;">${tn}</span></td><td>${ph[i]||'-'}</td><td>${datas.length>0?(ph[i]/datas.length).toFixed(1):'0'}</td></tr>`;
    });
    html += '</tbody></table></div>';
    
    html += '<div class="section-title">📅 Frequência Mensal</div><div class="table-wrap"><table><thead><tr><th class="sticky-col">Entregador</th>';
    const hoje = new Date();
    for (let i = 29; i >= 0; i--) {
        const d = new Date(hoje); d.setDate(d.getDate() - i);
        html += `<th>${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}</th>`;
    }
    html += '<th>Tot</th><th>Dias</th></tr></thead><tbody>';
    
    listaE.sort().forEach(nome => {
        html += `<tr><td class="sticky-col"><strong>${nome}</strong></td>`;
        let tot = 0, dias = 0, passados = 0;
        for (let i = 29; i >= 0; i--) {
            const d = new Date(hoje); d.setDate(d.getDate() - i);
            const ds = fmt(d);
            const v = (dadosE[ds]?.[nome]?.reduce((a,b)=>a+b,0)) || 0;
            if (d > hoje) html += `<td><span class="freq-cinza">-</span></td>`;
            else {
                passados++;
                if (v > 0) { html += `<td><span class="freq-verde">${v}</span></td>`; tot += v; dias++; }
                else html += `<td><span class="freq-vermelho">0</span></td>`;
            }
        }
        html += `<td style="color:#FFD700;font-weight:bold;">${tot}</td><td>${dias} (${passados>0?((dias/passados)*100).toFixed(0):0}%)</td></tr>`;
    });
    html += '</tbody></table></div>';
    
    document.getElementById('dash-entr-conteudo').innerHTML = html;
}

// ============ LOG ============
function mudarDiaLog(d) { dataLog.setDate(dataLog.getDate() + d); document.getElementById('log-data').value = fmt(dataLog); renderLog(window._logModo||'entregador'); }

async function renderLog(modo) {
    window._logModo = modo;
    document.getElementById('log-data').value = fmt(dataLog);
    
    const fbL = await fbLoad('log_entregas');
    if (fbL?.dados) { logE = fbL.dados; }
    
    const di = fmt(dataLog);
    let log = logE.filter(e => e.data === di);
    
    if (!log.length) {
        document.getElementById('log-conteudo').innerHTML = '<div class="empty-state">📭 Nenhum registro neste dia</div>';
        return;
    }
    
    if (modo === 'detalhado') {
        log.sort((a,b) => b.hora.localeCompare(a.hora));
        let html = '<div class="table-wrap"><table><thead><tr><th>#</th><th>Hora</th><th>Estabelecimento</th><th>Entreg.</th><th></th></tr></thead><tbody>';
        log.forEach((e, i) => {
            const idx = logE.findIndex(x => x.data===e.data&&x.hora===e.hora&&x.restaurante===e.restaurante&&x.entregador===e.entregador);
            html += `<tr><td>${i+1}</td><td>${e.hora}</td><td>${e.restaurante}</td><td><strong>${e.entregador}</strong></td><td><span onclick="remLog(${idx})" style="color:#dc2626;cursor:pointer;z-index:5;position:relative;">✖️</span></td></tr>`;
        });
        html += '</tbody></table></div>';
        document.getElementById('log-conteudo').innerHTML = html;
    } else if (modo === 'entregador') {
        const ent = [...new Set(log.map(e=>e.entregador))].sort();
        const rest = [...new Set(log.map(e=>e.restaurante))].sort();
        let html = '<div class="table-wrap"><table><thead><tr><th>Entregador</th>';
        rest.forEach(r => html += `<th>${r.substring(0,10)}</th>`);
        html += '<th>Tot</th></tr></thead><tbody>';
        ent.forEach(e => {
            html += `<tr><td><strong>${e}</strong></td>`; let t = 0;
            rest.forEach(r => { const v = log.filter(x=>x.entregador===e&&x.restaurante===r).length; t += v; html += `<td class="${v>0?'cell-highlight':''}">${v||'-'}</td>`; });
            html += `<td class="total-col">${t}</td></tr>`;
        });
        html += '</tbody></table></div>';
        document.getElementById('log-conteudo').innerHTML = html;
    } else if (modo === 'estabelecimento') {
        const ent = [...new Set(log.map(e=>e.entregador))].sort();
        const rest = [...new Set(log.map(e=>e.restaurante))].sort();
        let html = '<div class="table-wrap"><table><thead><tr><th>Estabelecimento</th>';
        ent.forEach(e => html += `<th>${e.substring(0,10)}</th>`);
        html += '<th>Tot</th></tr></thead><tbody>';
        rest.forEach(r => {
            html += `<tr><td><strong>${r.substring(0,18)}</strong></td>`; let t = 0;
            ent.forEach(e => { const v = log.filter(x=>x.restaurante===r&&x.entregador===e).length; t += v; html += `<td class="${v>0?'cell-highlight':''}">${v||'-'}</td>`; });
            html += `<td class="total-col">${t}</td></tr>`;
        });
        html += '</tbody></table></div>';
        document.getElementById('log-conteudo').innerHTML = html;
    }
}

async function remLog(idx) { if (!confirm('Remover registro?')) return; logE.splice(idx, 1); await fbSave('log_entregas', 'dados', { dados: logE, ts: Date.now() }); renderLog(window._logModo||'entregador'); }
async function limparLog() { if (!confirm('⚠️ Apagar TODO o log?')) return; if (!confirm('Confirma?')) return; logE = []; await fbSave('log_entregas', 'dados', { dados: [], ts: Date.now() }); renderLog('entregador'); }

    updateSync();
    
    const fbE = await fbLoad('entregadores');
    if (fbE) { listaE = fbE.lista || []; dadosE = fbE.dados || {}; }
    else { const je = localStorage.getItem('mapaEntregasBackupCompleto'); if (je) { const d = JSON.parse(je); listaE = d.entregadores || []; dadosE = d.todosDados || {}; } }
    
    const fbR = await fbLoad('restaurantes');
    if (fbR) { listaR = fbR.lista || []; dadosR = fbR.dados || {}; }
    else { const jr = localStorage.getItem('mapaRestaurantesBackup'); if (jr) { const d = JSON.parse(jr); listaR = d.restaurantes || []; dadosR = d.todosDados || {}; } }
    
    const fbL = await fbLoad('log_entregas');
    if (fbL) { logE = fbL.dados || []; }
    else { const jl = localStorage.getItem('logExatoEntregas'); if (jl) { logE = JSON.parse(jl); } }
    
    renderEntr();
}
