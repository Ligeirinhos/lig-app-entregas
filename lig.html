<script>
// ============ FIREBASE ============
firebase.initializeApp({
    apiKey: "AIzaSyBNACpsgB4XFn2FuiRQbG0Nbd-958aAKbI",
    authDomain: "ligeirinho-s.firebaseapp.com",
    projectId: "ligeirinho-s",
    storageBucket: "ligeirinho-s.firebasestorage.app",
    messagingSenderId: "10630838120",
    appId: "1:10630838120:web:7194dfdad262b5c9a288dd"
});
const db = firebase.firestore();

// ============ DADOS ============
const H = ['7h','8h','9h','10h','11h','12h','13h','14h','15h','16h','17h','18h','19h','20h','21h','22h'];
const DIAS_SEMANA = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const TURNOS = {
    '🌅 Manhã': { indices: [0,1,2,3], cor: '#f59e0b' },
    '☀️ Almoço': { indices: [4,5,6], cor: '#ef4444' },
    '🌤️ Tarde': { indices: [7,8,9,10], cor: '#3b82f6' },
    '🌙 Noite': { indices: [11,12,13,14,15], cor: '#8b5cf6' }
};

let listaE = [], listaR = [], dadosE = {}, dadosR = {}, logE = [];
let dataE = new Date(), dataR = new Date(), dataLog = new Date();
let online = navigator.onLine;
let _proc = [];

window.addEventListener('online', () => { online = true; updateSync(); });
window.addEventListener('offline', () => { online = false; updateSync(); });

function updateSync() {
    const el = document.getElementById('sync-status');
    el.innerHTML = online ? '<span>☁️</span> Online' : '<span>📡</span> Offline';
    el.className = 'sync-status ' + (online ? 'on' : 'off');
}
function fmt(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function horaToIdx(hora) { let h = parseInt(hora.split(':')[0]); if (h < 7) h = 7; if (h > 22) h = 22; return h - 7; }

// ============ FIREBASE HELPERS ============
async function fbSave(col, doc, data) {
    localStorage.setItem(`fb_${col}_${doc}`, JSON.stringify(data));
    if (!online) return;
    try { await db.collection(col).doc(doc).set(data, { merge: true }); } catch(e) {}
}
async function fbLoad(col) {
    if (online) {
        try {
            const snap = await db.collection(col).doc('dados').get();
            if (snap.exists) { const d = snap.data(); localStorage.setItem(`fb_${col}_dados`, JSON.stringify(d)); return d; }
        } catch(e) {}
    }
    const c = localStorage.getItem(`fb_${col}_dados`);
    return c ? JSON.parse(c) : null;
}

// ============ ALERTAS DE INATIVIDADE ============
function gerarAlertasInatividade(fonte, lista, limiteDias, tipo) {
    const hoje = new Date(); hoje.setHours(0,0,0,0); const alertas = [];
    lista.forEach(nome => { let diasInativo = 0; for (let i = 0; i < 30; i++) { const d = new Date(hoje); d.setDate(d.getDate() - i); const ds = fmt(d); const dia = fonte[ds]; const total = dia?.[nome]?.reduce((a,b)=>a+b,0) || 0; if (total === 0) diasInativo++; else break; } if (diasInativo >= limiteDias) { alertas.push({ nome, dias: diasInativo, tipo: diasInativo >= limiteDias * 2 ? 'danger' : 'warning', msg: `${diasInativo >= limiteDias * 2 ? '🚨' : '⚠️'} ${nome} está há ${diasInativo} dias sem ${tipo === 'entregador' ? 'entregar' : 'pedidos'}` }); } });
    return alertas.sort((a,b) => b.dias - a.dias);
}

// ============ NAVEGAÇÃO ============
const secoes = { entr:'sec-entr', rest:'sec-rest', proc:'sec-proc', busca:'sec-busca', 'dash-entr':'sec-dash-entr', 'dash-rest':'sec-dash-rest', log:'sec-log' };
const navLabels = ['entr','rest','proc','busca','dash-entr','dash-rest','log'];

function nav(sec) {
    document.querySelectorAll('.app-content').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(secoes[sec]).classList.add('active');
    document.querySelectorAll('.nav-item')[navLabels.indexOf(sec)].classList.add('active');
    if (sec === 'entr') renderEntr();
    if (sec === 'rest') renderRest();
    if (sec === 'busca') prepararBusca();
    if (sec === 'dash-entr') renderDashEntr();
    if (sec === 'dash-rest') renderDashRest();
    if (sec === 'log') { dataLog = new Date(); renderLog('entregador'); }
}

// ============ PLANILHA ENTREGADORES ============
function mudarDiaEntr(d) { dataE.setDate(dataE.getDate() + d); renderEntr(); }
function renderEntr() {
    document.getElementById('data-entr').value = fmt(dataE);
    const chave = fmt(dataE);
    if (!dadosE[chave]) dadosE[chave] = {};
    listaE.sort().forEach(n => { if (!dadosE[chave][n]) dadosE[chave][n] = new Array(16).fill(0); });
    let html = '<table><thead><tr><th class="sticky-col">Entregador</th>';
    H.forEach(h => html += `<th>${h}</th>`);
    html += '<th>Tot</th></tr></thead><tbody>';
    let totaisHora = new Array(16).fill(0);
    listaE.sort().forEach(nome => {
        const linha = dadosE[chave][nome] || new Array(16).fill(0);
        html += `<tr><td class="sticky-col"><strong>${nome}</strong> <span onclick="remEntr('${nome}')" style="color:#dc2626;cursor:pointer;font-size:9px;">✖️</span></td>`;
        let s = 0;
        H.forEach((_, i) => { const v = linha[i]||0; s += v; totaisHora[i] += v;
            html += `<td><input type="number" min="0" value="${v||''}" placeholder="0" style="width:35px;padding:2px;text-align:center;" onchange="celEntr('${nome}',${i},this.value)"></td>`; });
        html += `<td style="color:#FFD700;font-weight:bold;">${s}</td></tr>`;
    });
    html += '<tr class="total-row"><td class="sticky-col"><strong>TOTAL/HORA</strong></td>';
    let sg = 0; totaisHora.forEach(v => { html += `<td>${v||'-'}</td>`; sg += v; });
    html += `<td class="total-col">${sg}</td></tr></tbody></table>`;
    document.getElementById('tabela-entr').innerHTML = html;
}
function celEntr(nome, idx, val) { const chave = fmt(dataE); const v = parseInt(val)||0; if (!dadosE[chave]) dadosE[chave] = {}; if (!dadosE[chave][nome]) dadosE[chave][nome] = new Array(16).fill(0); dadosE[chave][nome][idx] = v; fbSave('entregadores', 'dados', { lista: listaE, dados: dadosE, ts: Date.now() }); }
function addEntr() { const n = document.getElementById('novo-entr').value.trim(); if (!n || listaE.includes(n)) return; listaE.push(n); document.getElementById('novo-entr').value=''; fbSave('entregadores','dados',{lista:listaE,dados:dadosE,ts:Date.now()}); renderEntr(); }
function remEntr(nome) { if (!confirm('Remover '+nome+'?')) return; listaE = listaE.filter(e=>e!==nome); Object.keys(dadosE).forEach(d=>delete dadosE[d][nome]); fbSave('entregadores','dados',{lista:listaE,dados:dadosE,ts:Date.now()}); renderEntr(); }
function resetarDiaEntr() { if (!confirm('Zerar dia?')) return; const c=fmt(dataE); if(!dadosE[c])dadosE[c]={}; listaE.forEach(n=>dadosE[c][n]=new Array(16).fill(0)); fbSave('entregadores','dados',{lista:listaE,dados:dadosE,ts:Date.now()}); renderEntr(); }

// ============ PLANILHA ESTABELECIMENTOS ============
function mudarDiaRest(d) { dataR.setDate(dataR.getDate() + d); renderRest(); }
function renderRest() {
    document.getElementById('data-rest').value = fmt(dataR);
    const chave = fmt(dataR);
    if (!dadosR[chave]) dadosR[chave] = {};
    listaR.sort().forEach(n => { if (!dadosR[chave][n]) dadosR[chave][n] = new Array(16).fill(0); });
    let html = '<table><thead><tr><th class="sticky-col">Estabelecimento</th>';
    H.forEach(h => html += `<th>${h}</th>`);

function processar() {
    const texto = document.getElementById('msg-wp').value.trim(); if (!texto) return;
    const linhas = texto.split('\n').filter(l => l.trim());
    const regex = /^\[(\d{1,2}\/\d{1,2},?\s+\d{1,2}:\d{2})\]\s+([^:]+):\s*(.+)$/;
    let ultR = null, ultH = null, ja = []; _proc = [];
    const limpar = t => t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ');
    linhas.forEach(l => { const m = l.match(regex); if (!m) return; const hora = m[1].split(/[,\s]+/).pop(); const nome = m[2].trim(); const msg = m[3].trim(); const like = /^👍/.test(msg) || /^✅/.test(msg);
        if (like && ultR) { const e = listaE.find(x => limpar(x) === limpar(nome) || limpar(nome).includes(limpar(x))); if (e && !ja.includes(e)) { _proc.push({ h: ultH, r: ultR, e }); ja.push(e); } }
        else if (!like) { const r = listaR.find(x => limpar(x) === limpar(nome) || limpar(nome).includes(limpar(x))); if (r) { ultR = r; ultH = hora; ja = []; } else { ultR = null; } }
    });
    renderResultadoProc();
}

function filtrarDatas(fonte, di, df, periodo) {
    let fd = {}, datas = []; const hoje = new Date(); hoje.setHours(0,0,0,0);
    Object.entries(fonte).forEach(([data, dia]) => { if (di || df) { if (di && data < di) return; if (df && data > df) return; } else { const [a,m,d] = data.split('-').map(Number); const diff = Math.floor((hoje - new Date(a,m-1,d)) / 86400000); if (periodo === 'hoje' && diff !== 0) return; if (periodo === 'semana' && (diff < 0 || diff >= 7)) return; } fd[data] = dia; datas.push(data); });
    return { fd, datas };
}

    const df = document.getElementById('busca-fim').value;

    const porDiaSemana = new Array(7).fill(0);

        if (dia[nome]) {

                diasComEntrega++;
                if (!ultimaEntrega || data > ultimaEntrega) ultimaEntrega = data;
                const [a,m,d] = data.split('-').map(Number);
                const dataObj = new Date(a,m-1,d);

                porDiaSemana[diaSem] += t;
                dia[nome].forEach((v,i) => {
                    porHora[i] += v;
                    Object.entries(TURNOS).forEach(([tn,tc]) => { if (tc.indices.includes(i)) porTurno[tn] += v; });
                });
            }
        }
        // Período
        if ((!di || data >= di) && (!df || data <= df)) {
            if (dia[nome]) totalPeriodo += dia[nome].reduce((a,b)=>a+b,0);
        }
    });

    const diasTotal = Object.keys(fonte).length || 1;
    const mediaGeral = (totalGeral / Math.max(1, diasComEntrega)).toFixed(1);

    let html = `<div class="section-title">🔍 ${label}: <span style="color:#fff;">${nome}</span></div>`;

    html += `<div class="mini-card"><div class="value">${ultimaEntrega ? ultimaEntrega.split('-').reverse().join('/') : 'Nunca'}</div><div class="label">Última Entrega</div></div>`;

    // Por Horário
    html += '<div class="section-title">📊 Por Horário</div><div class="table-wrap"><table><thead><tr><th>Hora</th>';
    H.forEach(h => html += `<th>${h}</th>`);
    html += '<th>Tot</th></tr></thead><tbody><tr><td><strong>Total</strong></td>';
    let somaHora = 0;
    porHora.forEach(v => { html += `<td>${v||'-'}</td>`; somaHora += v; });
    html += `<td class="total-col">${somaHora}</td></tr></tbody></table></div>`;

    // Por Dia da Semana
    html += '<div class="section-title">📅 Por Dia da Semana</div><div class="table-wrap"><table><thead><tr>';
    DIAS_SEMANA.forEach(d => html += `<th>${d}</th>`);
    html += '<th>Tot</th></tr></thead><tbody><tr>';
    let somaDia = 0;
    porDiaSemana.forEach(v => { html += `<td>${v||'-'}</td>`; somaDia += v; });
    html += `<td class="total-col">${somaDia}</td></tr></tbody></table></div>`;

    // Por Turno
    html += '<div class="section-title">🕐 Por Turno</div><div class="grid-4">';
    Object.entries(porTurno).forEach(([t, v]) => html += `<div class="mini-card" style="border-left:4px solid ${TURNOS[t].cor};"><div class="value">${v}</div><div class="label">${t}</div></div>`);
    html += '</div>';

    document.getElementById('busca-resultado').innerHTML = html;
}

// ============ INIT ============
async function init() {
    updateSync();
    const fbE = await fbLoad('entregadores'); if (fbE) { listaE = fbE.lista || []; dadosE = fbE.dados || {}; }
    const fbR = await fbLoad('restaurantes'); if (fbR) { listaR = fbR.lista || []; dadosR = fbR.dados || {}; }
    const fbL = await fbLoad('log_entregas'); if (fbL) { logE = fbL.dados || []; }
    renderEntr();
}
window.onload = init;
</script>
