<script>
// ============ FIREBASE ============
const firebaseConfig = {
    apiKey: "AIzaSyBNACpsgB4XFn2FuiRQbG0Nbd-958aAKbI",
    authDomain: "ligeirinho-s.firebaseapp.com",
    projectId: "ligeirinho-s",
    storageBucket: "ligeirinho-s.firebasestorage.app",
    messagingSenderId: "10630838120",
    appId: "1:10630838120:web:7194dfdad262b5c9a288dd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.settings({ merge: true });

// ============ DADOS LOCAIS (cache) ============
const HORARIOS = ['7h','8h','9h','10h','11h','12h','13h','14h','15h','16h','17h','18h','19h','20h','21h','22h'];
let entregadoresLista = [], restaurantesLista = [];
let dadosEntr = {}, dadosRest = {};
let logEntregas = [];
let dataAtualEntr = new Date(), dataAtualRest = new Date();
let _entregasProc = [];

// ============ SYNC ============
let online = navigator.onLine;
window.addEventListener('online', () => { online = true; updateSyncStatus(); syncAll(); });
window.addEventListener('offline', () => { online = false; updateSyncStatus(); });

function updateSyncStatus() {
    const el = document.getElementById('sync-status');
    if (online) { el.innerHTML = '<span>☁️</span> Online'; el.className = 'sync-status'; }
    else { el.innerHTML = '<span>📡</span> Offline'; el.className = 'sync-status offline'; }
}

// Salvar no Firestore
async function saveFirestore(colecao, doc, dados) {
    if (!online) { salvarLocalCache(colecao, doc, dados); return; }
    try {
        await db.collection(colecao).doc(doc).set(dados, { merge: true });
        updateSyncStatus();
    } catch(e) {
        salvarLocalCache(colecao, doc, dados);
    }
}

// Carregar do Firestore
async function loadFirestore(colecao) {
    if (!online) return carregarLocalCache(colecao);
    try {
        const snap = await db.collection(colecao).get();
        const dados = {};
        snap.forEach(doc => dados[doc.id] = doc.data());
        updateSyncStatus();
        return dados;
    } catch(e) {
        return carregarLocalCache(colecao);
    }
}

function salvarLocalCache(colecao, doc, dados) {
    const key = `cache_${colecao}_${doc}`;
    localStorage.setItem(key, JSON.stringify(dados));
}

function carregarLocalCache(colecao) {
    const dados = {};
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith(`cache_${colecao}_`)) {
            const doc = key.replace(`cache_${colecao}_`, '');
            try { dados[doc] = JSON.parse(localStorage.getItem(key)); } catch(e) {}
        }
    }
    return Object.keys(dados).length > 0 ? dados : null;
}

async function syncAll() {
    if (!online) return;
    // Sincronizar cache local -> Firestore
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('cache_')) {
            const parts = key.split('_');
            const colecao = parts[1];
            const doc = parts.slice(2).join('_');
            try {
                const dados = JSON.parse(localStorage.getItem(key));
                await db.collection(colecao).doc(doc).set(dados, { merge: true });
                localStorage.removeItem(key);
            } catch(e) {}
        }
    }
}

// ============ NAVEGAÇÃO ============
function navegar(secao) {
    document.querySelectorAll('.app-content').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    const mapa = {
        'entregadores': 'sec-entregadores',
        'restaurantes': 'sec-restaurantes',
        'processador': 'sec-processador',
        'dash-entr': 'sec-dash-entr',
        'log': 'sec-log'
    };
    
    const titulos = {
        'entregadores': 'Planilha Entregadores',
        'restaurantes': 'Planilha Restaurantes',
        'processador': 'Processador WhatsApp',
        'dash-entr': 'Dashboard Entregadores',
        'log': 'Log de Entregas'
    };
    
    document.getElementById(mapa[secao]).classList.add('active');
    document.querySelectorAll('.nav-item')[Object.keys(mapa).indexOf(secao)].classList.add('active');
    document.getElementById('header-subtitle').textContent = titulos[secao];
    
    if (secao === 'entregadores') renderPlanilhaEntr();
    if (secao === 'restaurantes') renderPlanilhaRest();
    if (secao === 'dash-entr') renderDashEntr();
    if (secao === 'log') renderLog('entregador');
}

// ============ PLANILHA ENTREGADORES ============
function mudarDia(tipo, delta) {
    if (tipo === 'entr') { dataAtualEntr.setDate(dataAtualEntr.getDate() + delta); renderPlanilhaEntr(); }
    else { dataAtualRest.setDate(dataAtualRest.getDate() + delta); renderPlanilhaRest(); }
}

function fmt(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

async function renderPlanilhaEntr() {
    document.getElementById('data-entr').value = fmt(dataAtualEntr);
    const chave = fmt(dataAtualEntr);
    
    // Carregar dados do Firebase se online
    if (online) {
        const fbData = await loadFirestore('entregadores');
        if (fbData) {
            if (fbData.lista) entregadoresLista = fbData.lista;
            if (fbData.dados) dadosEntr = fbData.dados;
        }
    }
    
    if (!dadosEntr[chave]) dadosEntr[chave] = {};
    entregadoresLista.sort().forEach(n => {
        if (!dadosEntr[chave][n]) dadosEntr[chave][n] = new Array(16).fill(0);
    });
    
    let html = '<table><thead><tr><th>Entregador</th>';
    HORARIOS.forEach(h => html += `<th>${h}</th>`);
    html += '<th>Total</th></tr></thead><tbody>';
    
    entregadoresLista.sort().forEach(nome => {
        const linha = dadosEntr[chave][nome] || new Array(16).fill(0);
        html += `<tr><td><strong>${nome}</strong> <span onclick="remEntr('${nome}')" style="color:#dc2626;cursor:pointer;">✖️</span></td>`;
        let s = 0;
        HORARIOS.forEach((_, i) => {
            const v = linha[i] || 0; s += v;
            html += `<td><input type="number" min="0" value="${v||''}" placeholder="0" style="width:42px;padding:4px;text-align:center;" onchange="atualizaCelEntr('${nome}',${i},this.value)"></td>`;
        });
        html += `<td style="color:#FFD700;font-weight:bold;">${s}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('tabela-entr').innerHTML = html;
}

function atualizaCelEntr(nome, idx, val) {
    const chave = fmt(dataAtualEntr);
    const v = parseInt(val) || 0;
    if (!dadosEntr[chave]) dadosEntr[chave] = {};
    if (!dadosEntr[chave][nome]) dadosEntr[chave][nome] = new Array(16).fill(0);
    dadosEntr[chave][nome][idx] = v;
    salvarDadosEntr();
    renderPlanilhaEntr();
}

function addEntregador() {
    const nome = document.getElementById('novo-entregador').value.trim();
    if (!nome || entregadoresLista.includes(nome)) return;
    entregadoresLista.push(nome);
    document.getElementById('novo-entregador').value = '';
    salvarDadosEntr();
    renderPlanilhaEntr();
}

function remEntr(nome) {
    if (!confirm('Remover '+nome+'?')) return;
    entregadoresLista = entregadoresLista.filter(e => e !== nome);
    Object.keys(dadosEntr).forEach(d => delete dadosEntr[d][nome]);
    salvarDadosEntr();
    renderPlanilhaEntr();
}

function resetarDiaEntr() {
    if (!confirm('Zerar dia?')) return;
    const chave = fmt(dataAtualEntr);
    if (!dadosEntr[chave]) dadosEntr[chave] = {};
    entregadoresLista.forEach(n => dadosEntr[chave][n] = new Array(16).fill(0));
    salvarDadosEntr();
    renderPlanilhaEntr();
}

async function salvarDadosEntr() {
    const dados = { lista: entregadoresLista, dados: dadosEntr, atualizado: new Date().toISOString() };
    await saveFirestore('entregadores', 'dados', dados);
}

// ============ PLANILHA RESTAURANTES ============
async function renderPlanilhaRest() {
    document.getElementById('data-rest').value = fmt(dataAtualRest);
    const chave = fmt(dataAtualRest);
    
    if (online) {
        const fbData = await loadFirestore('restaurantes');
        if (fbData) {
            if (fbData.lista) restaurantesLista = fbData.lista;
            if (fbData.dados) dadosRest = fbData.dados;
        }
    }
    
    if (!dadosRest[chave]) dadosRest[chave] = {};
    restaurantesLista.sort().forEach(n => {
        if (!dadosRest[chave][n]) dadosRest[chave][n] = new Array(16).fill(0);
    });
    
    let html = '<table><thead><tr><th>Restaurante</th>';
    HORARIOS.forEach(h => html += `<th>${h}</th>`);
    html += '<th>Total</th></tr></thead><tbody>';
    
    restaurantesLista.sort().forEach(nome => {
        const linha = dadosRest[chave][nome] || new Array(16).fill(0);
        html += `<tr><td><strong>${nome}</strong> <span onclick="remRest('${nome}')" style="color:#dc2626;cursor:pointer;">✖️</span></td>`;
        let s = 0;
        HORARIOS.forEach((_, i) => {
            const v = linha[i] || 0; s += v;
            html += `<td><input type="number" min="0" value="${v||''}" placeholder="0" style="width:42px;padding:4px;" onchange="atualizaCelRest('${nome}',${i},this.value)"></td>`;
        });
        html += `<td style="color:#FFD700;font-weight:bold;">${s}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('tabela-rest').innerHTML = html;
}

function atualizaCelRest(nome, idx, val) {
    const chave = fmt(dataAtualRest);
    const v = parseInt(val) || 0;
    if (!dadosRest[chave]) dadosRest[chave] = {};
    if (!dadosRest[chave][nome]) dadosRest[chave][nome] = new Array(16).fill(0);
    dadosRest[chave][nome][idx] = v;
    salvarDadosRest();
    renderPlanilhaRest();
}

function addRestaurante() {
    const nome = document.getElementById('novo-restaurante').value.trim();
    if (!nome || restaurantesLista.includes(nome)) return;
    restaurantesLista.push(nome);
    document.getElementById('novo-restaurante').value = '';
    salvarDadosRest();
    renderPlanilhaRest();
}

function remRest(nome) {
    if (!confirm('Remover '+nome+'?')) return;
    restaurantesLista = restaurantesLista.filter(e => e !== nome);
    Object.keys(dadosRest).forEach(d => delete dadosRest[d][nome]);
    salvarDadosRest();
    renderPlanilhaRest();
}

function resetarDiaRest() {
    if (!confirm('Zerar dia?')) return;
    const chave = fmt(dataAtualRest);
    if (!dadosRest[chave]) dadosRest[chave] = {};
    restaurantesLista.forEach(n => dadosRest[chave][n] = new Array(16).fill(0));
    salvarDadosRest();
    renderPlanilhaRest();
}

async function salvarDadosRest() {
    const dados = { lista: restaurantesLista, dados: dadosRest, atualizado: new Date().toISOString() };
    await saveFirestore('restaurantes', 'dados', dados);
}

// ============ PROCESSADOR ============
function processarMsg() {
    const texto = document.getElementById('msg-whatsapp').value.trim();
    if (!texto) return;
    
    const linhas = texto.split('\n').filter(l => l.trim());
    const regex = /^\[(\d{1,2}\/\d{1,2}\s+\d{1,2}:\d{2})\]\s+([^:]+):\s*(.+)$/;
    let ultRest = null, ultHora = null, jaCont = [];
    _entregasProc = [];
    const naoRec = [];
    
    const limpar = t => t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ');
    
    linhas.forEach(l => {
        const m = l.match(regex); if (!m) return;
        const hora = m[1].split(' ')[1], nome = m[2].trim(), msg = m[3].trim();
        const isLike = /^👍/.test(msg) || /^✅/.test(msg);
        
        if (isLike && ultRest) {
            const entr = entregadoresLista.find(e => limpar(e) === limpar(nome) || limpar(nome).includes(limpar(e)));
            if (entr && !jaCont.includes(entr)) {
                _entregasProc.push({ hora: ultHora, restaurante: ultRest, entregador: entr });
                jaCont.push(entr);
            } else if (!entr) naoRec.push({ tipo: 'entregador', nome, hora });
        } else if (!isLike) {
            const rest = restaurantesLista.find(r => limpar(r) === limpar(nome) || limpar(nome).includes(limpar(r)));
            if (rest) { ultRest = rest; ultHora = hora; jaCont = []; }
            else { naoRec.push({ tipo: 'restaurante', nome, hora }); ultRest = null; }
        }
    });
    
    let html = `<div class="section-title">✅ ${_entregasProc.length} entregas</div>`;
    if (_entregasProc.length > 0) {
        html += '<table><thead><tr><th>#</th><th>Hora</th><th>Restaurante</th><th>Entregador</th><th></th></tr></thead><tbody>';
        _entregasProc.forEach((e, i) => {
            html += `<tr><td>${i+1}</td><td>${e.hora}</td><td>${e.restaurante}</td><td><strong>${e.entregador}</strong></td><td><span onclick="remProc(${i})" style="color:#dc2626;cursor:pointer;">✖️</span></td></tr>`;
        });
        html += '</tbody></table>';
    }
    if (naoRec.length > 0) {
        html += `<div class="section-title">⚠️ ${naoRec.length} não reconhecidos</div>`;
        naoRec.forEach(n => html += `<div style="color:#f59e0b;font-size:12px;">• ${n.nome} (${n.tipo})</div>`);
    }
    if (_entregasProc.length > 0) {
        html += `<br><button class="btn btn-gold" onclick="salvarProc()">💾 Salvar com Precisão</button>`;
    }
    document.getElementById('resultado-proc').innerHTML = html;
}

function remProc(i) { _entregasProc.splice(i, 1); processarMsg(); }

async function salvarProc() {
    if (!_entregasProc.length) return;
    
    const dp = _entregasProc[0].data?.split('/') || [String(new Date().getDate()), String(new Date().getMonth()+1)];
    const dataStr = `${new Date().getFullYear()}-${String(dp[1]||new Date().getMonth()+1).padStart(2,'0')}-${String(dp[0]||new Date().getDate()).padStart(2,'0')}`;
    
    // Salvar no log
    const logSnap = await loadFirestore('log_entregas');
    let log = logSnap?.dados || [];
    _entregasProc.forEach(e => {
        log.push({ data: dataStr, hora: e.hora, restaurante: e.restaurante, entregador: e.entregador });
    });
    await saveFirestore('log_entregas', 'dados', { dados: log, atualizado: new Date().toISOString() });
    
    // Salvar nas planilhas
    _entregasProc.forEach(e => {
        const h = parseInt(e.hora.split(':')[0]), idx = h - 7;
        if (idx < 0 || idx >= 16) return;
        if (!dadosEntr[dataStr]) dadosEntr[dataStr] = {};
        if (!dadosEntr[dataStr][e.entregador]) dadosEntr[dataStr][e.entregador] = new Array(16).fill(0);
        dadosEntr[dataStr][e.entregador][idx]++;
        if (!dadosRest[dataStr]) dadosRest[dataStr] = {};
        if (!dadosRest[dataStr][e.restaurante]) dadosRest[dataStr][e.restaurante] = new Array(16).fill(0);
        dadosRest[dataStr][e.restaurante][idx]++;
    });
    
    await salvarDadosEntr();
    await salvarDadosRest();
    alert(`✅ ${_entregasProc.length} entregas salvas em ${dataStr}!`);
    _entregasProc = [];
    document.getElementById('resultado-proc').innerHTML = '<div class="empty-state">✅ Salvo!</div>';
}

// ============ DASHBOARD ENTREGADORES ============
async function renderDashEntr() {
    if (online) {
        const fb = await loadFirestore('entregadores');
        if (fb) { if (fb.lista) entregadoresLista = fb.lista; if (fb.dados) dadosEntr = fb.dados; }
    }
    
    const periodo = document.getElementById('dash-periodo-entr').value;
    const di = document.getElementById('dash-inicio-entr').value;
    const df = document.getElementById('dash-fim-entr').value;
    
    let dadosFiltrados = {}, datas = [];
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    
    Object.entries(dadosEntr).forEach(([data, dia]) => {
        if (di || df) {
            if (di && data < di) return;
            if (df && data > df) return;
        } else {
            const [a,m,d] = data.split('-').map(Number);
            const diff = Math.floor((hoje - new Date(a,m-1,d)) / 86400000);
            if (periodo === 'hoje' && diff !== 0) return;
            if (periodo === 'semana' && (diff < 0 || diff >= 7)) return;
        }
        dadosFiltrados[data] = dia;
        datas.push(data);
    });
    
    let total = 0;
    const porEntr = {};
    const porHora = new Array(16).fill(0);
    
    Object.values(dadosFiltrados).forEach(dia => {
        entregadoresLista.forEach(nome => {
            if (dia[nome]) {
                const t = dia[nome].reduce((a,b)=>a+b,0);
                total += t;
                porEntr[nome] = (porEntr[nome]||0) + t;
                dia[nome].forEach((v,i) => porHora[i] += v);
            }
        });
    });
    
    let html = '<div class="grid-4">';
    html += `<div class="mini-card"><div class="value">${total}</div><div class="label">Total</div></div>`;
    html += `<div class="mini-card"><div class="value">${Object.keys(porEntr).length}</div><div class="label">Entregadores</div></div>`;
    html += `<div class="mini-card"><div class="value">${datas.length}</div><div class="label">Dias</div></div>`;
    html += `<div class="mini-card"><div class="value">${datas.length>0?(total/datas.length).toFixed(1):'0'}</div><div class="label">Média/Dia</div></div>`;
    html += '</div>';
    
    const ranking = Object.entries(porEntr).sort((a,b)=>b[1]-a[1]);
    if (ranking.length > 0) {
        html += '<div class="section-title">🏆 Ranking</div>';
        ranking.forEach(([n, t], i) => {
            html += `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #333;">`;
            html += `<span>${['🥇','🥈','🥉'][i]||`${i+1}º`} ${n}</span>`;
            html += `<span style="color:#FFD700;font-weight:bold;">${t}</span></div>`;
        });
    }
    
    html += '<div class="section-title">📊 Por Horário</div><div style="overflow-x:auto;"><table><thead><tr><th>Hora</th>';
    HORARIOS.forEach(h => html += `<th>${h}</th></tr></thead><tbody><tr><td><strong>Total</strong></td>`);
    porHora.forEach(v => html += `<td>${v||'-'}</td>`);
    html += '</tr></tbody></table></div>';
    
    document.getElementById('dash-entr-conteudo').innerHTML = html;
    
    setTimeout(() => {
        const canvas = document.getElementById('chart-entr');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            const ex = Chart.getChart('chart-entr');
            if (ex) ex.destroy();
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ranking.slice(0,6).map(r=>r[0]),
                    datasets: [{ data: ranking.slice(0,6).map(r=>r[1]), backgroundColor: ['#FFD700','#3b82f6','#dc2626','#22c55e','#f59e0b','#8b5cf6'] }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
            });
        }
    }, 300);
}

// ============ LOG ============
async function renderLog(modo) {
    window._logModo = modo;
    
    if (online) {
        const fb = await loadFirestore('log_entregas');
        if (fb?.dados) logEntregas = fb.dados;
    }
    
    const di = document.getElementById('log-inicio').value;
    const df = document.getElementById('log-fim').value;
    
    let log = [...logEntregas];
    if (di) log = log.filter(e => e.data >= di);
    if (df) log = log.filter(e => e.data <= df);
    
    if (!log.length) {
        document.getElementById('log-conteudo').innerHTML = '<div class="empty-state">📭 Nenhum registro</div>';
        return;
    }
    
    if (modo === 'detalhado') {
        log.sort((a,b) => b.data.localeCompare(a.data) || b.hora.localeCompare(a.hora));
        let html = '<table><thead><tr><th>#</th><th>Data</th><th>Hora</th><th>Restaurante</th><th>Entregador</th><th></th></tr></thead><tbody>';
        log.forEach((e, i) => {
            html += `<tr><td>${i+1}</td><td>${e.data.split('-').reverse().join('/')}</td><td>${e.hora}</td><td>${e.restaurante}</td><td><strong>${e.entregador}</strong></td><td><span onclick="remLog(${logEntregas.findIndex(x=>x.data===e.data&&x.hora===e.hora&&x.restaurante===e.restaurante&&x.entregador===e.entregador)})" style="color:#dc2626;cursor:pointer;">✖️</span></td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('log-conteudo').innerHTML = html;
    } else if (modo === 'entregador') {
        const ent = [...new Set(log.map(e=>e.entregador))].sort();
        const rest = [...new Set(log.map(e=>e.restaurante))].sort();
        let html = '<table><thead><tr><th>Entregador</th>';
        rest.forEach(r => html += `<th>${r.substring(0,12)}</th>`);
        html += '<th>Total</th></tr></thead><tbody>';
        ent.forEach(e => {
            html += `<tr><td><strong>${e}</strong></td>`;
            let t = 0;
            rest.forEach(r => {
                const v = log.filter(x=>x.entregador===e&&x.restaurante===r).length;
                t += v;
                html += `<td class="${v>0?'cell-highlight':''}">${v||'-'}</td>`;
            });
            html += `<td class="total-col">${t}</td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('log-conteudo').innerHTML = html;
    }
}

async function remLog(idx) {
    if (!confirm('Remover registro?')) return;
    logEntregas.splice(idx, 1);
    await saveFirestore('log_entregas', 'dados', { dados: logEntregas, atualizado: new Date().toISOString() });
    renderLog(window._logModo || 'entregador');
}

async function limparTodoLog() {
    if (!confirm('⚠️ Apagar TODO o log?')) return;
    logEntregas = [];
    await saveFirestore('log_entregas', 'dados', { dados: [], atualizado: new Date().toISOString() });
    renderLog('entregador');
}

// ============ EXPORTAÇÃO ============
function exportarExcel(tipo) {
    const dados = [['Data', tipo==='entregadores'?'Entregador':'Restaurante', ...HORARIOS, 'Total']];
    const lista = tipo === 'entregadores' ? entregadoresLista : restaurantesLista;
    const dadosFonte = tipo === 'entregadores' ? dadosEntr : dadosRest;
    
    Object.entries(dadosFonte).forEach(([data, dia]) => {
        lista.forEach(nome => {
            if (dia[nome]) {
                dados.push([data, nome, ...dia[nome], dia[nome].reduce((a,b)=>a+b,0)]);
            }
        });
    });
    
    const ws = XLSX.utils.aoa_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, tipo);
    XLSX.writeFile(wb, `relatorio-${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ============ INIT ============
async function init() {
    updateSyncStatus();
    
    // Carregar dados iniciais
    if (online) {
        const fbEntr = await loadFirestore('entregadores');
        if (fbEntr) { entregadoresLista = fbEntr.lista || []; dadosEntr = fbEntr.dados || {}; }
        
        const fbRest = await loadFirestore('restaurantes');
        if (fbRest) { restaurantesLista = fbRest.lista || []; dadosRest = fbRest.dados || {}; }
        
        const fbLog = await loadFirestore('log_entregas');
        if (fbLog?.dados) logEntregas = fbLog.dados;
    } else {
        // Carregar do cache local
        const cacheEntr = carregarLocalCache('entregadores');
        if (cacheEntr?.dados) { entregadoresLista = cacheEntr.dados.lista || []; dadosEntr = cacheEntr.dados.dados || {}; }
        
        const cacheRest = carregarLocalCache('restaurantes');
        if (cacheRest?.dados) { restaurantesLista = cacheRest.dados.lista || []; dadosRest = cacheRest.dados.dados || {}; }
        
        const cacheLog = carregarLocalCache('log_entregas');
        if (cacheLog?.dados) logEntregas = cacheLog.dados.dados || [];
    }
    
    renderPlanilhaEntr();
    
    // Sincronizar cache offline se voltou online
    if (online) await syncAll();
}

window.onload = init;
