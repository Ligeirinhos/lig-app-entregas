<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ligeirinho's Busca">
    <title>🔍 Busca Avançada</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a1a'/><text x='50' y='65' text-anchor='middle' font-size='60'>🔍</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a1a'/><text x='50' y='65' text-anchor='middle' font-size='60'>🔍</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .header { text-align: center; padding: 15px 0; border-bottom: 2px solid #FFD700; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header h1 { color: #FFD700; font-size: 20px; }
        .busca-container { display: flex; flex-direction: column; gap: 8px; background: #222; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        .busca-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .busca-row select, .busca-row input, .busca-row button { flex: 1 1 auto; min-width: 80px; background: #1a1a1a; border: 2px solid #444; border-radius: 8px; padding: 8px 10px; color: #fff; font-size: 12px; font-family: inherit; }
        .busca-row select { min-width: 100px; }
        .busca-row input[type="date"] { min-width: 110px; }
        .busca-row label { font-size: 11px; color: #aaa; display: flex; align-items: center; gap: 4px; }
        .btn { padding: 8px 14px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 12px; border: none; font-family: inherit; }
        .btn-gold { background: #FFD700; color: #1a1a1a; }
        .btn-outline { background: transparent; border: 2px solid #FFD700; color: #FFD700; }
        .btn-sm { padding: 4px 10px; font-size: 10px; }
        .section-title { color: #FFD700; margin: 15px 0 8px; font-weight: bold; border-bottom: 1px solid #FFD700; padding-bottom: 4px; font-size: 15px; display: flex; justify-content: space-between; }
        .section-title .small { font-size: 11px; color: #aaa; font-weight: normal; }
        .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        table th { background: #1a1a1a; color: #FFD700; padding: 8px 5px; font-size: 10px; position: sticky; top: 0; z-index: 2; }
        table td { padding: 6px 5px; text-align: center; border-bottom: 1px solid #333; }
        .sticky-col { position: sticky; left: 0; background: #2a2a2a; font-weight: 600; z-index: 1; }
        th.sticky-col { background: #1a1a1a; z-index: 3; }
        .total-col { background: #1a1a1a !important; color: #FFD700 !important; font-weight: bold; }
        .mini-card { background: #1a1a1a; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .mini-card .value { font-size: 24px; color: #FFD700; font-weight: bold; }
        .mini-card .label { font-size: 10px; color: #aaa; text-transform: uppercase; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; margin: 10px 0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .empty-state { text-align: center; padding: 30px; color: #888; font-size: 14px; }
        .chart-container { background: #222; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .comparacao { background: #1f1f1f; padding: 8px; border-radius: 6px; border-left: 4px solid #FFD700; }
        .trend-up { color: #22c55e; } .trend-down { color: #dc2626; } .trend-flat { color: #f59e0b; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .checkbox-group label { color: #ccc; font-size: 11px; display: flex; align-items: center; gap: 3px; }
        .legenda { font-size: 10px; color: #aaa; margin: 8px 0; display: flex; flex-wrap: wrap; gap: 12px; }
        .legenda span { display: flex; align-items: center; gap: 4px; }
        @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="header">
    <h1>🔍 Busca Avançada</h1>
    <button class="btn btn-outline btn-sm" onclick="exportarCSV()">📥 CSV</button>
</div>
<div class="busca-container">
    <div class="busca-row">
        <select id="busca-tipo" onchange="prepararBusca()">
            <option value="entregador">👤 Entregador</option>
            <option value="estabelecimento">🏪 Estabelecimento</option>
        </select>
        <select id="busca-turno" onchange="prepararBusca()">
            <option value="todos">🔄 Todos</option>
            <option value="manha">🌅 Manhã</option>
            <option value="almoco">☀️ Almoço</option>
            <option value="tarde">🌤️ Tarde</option>
            <option value="noite">🌙 Noite</option>
        </select>
        <select id="busca-nome" style="flex:2;"><option value="">Selecione...</option></select>
        <label><input type="checkbox" id="incluir-inativos" checked> Inativos</label>
    </div>
    <div class="busca-row">
        <input type="date" id="busca-inicio" placeholder="De">
        <input type="date" id="busca-fim" placeholder="Até">
        <button class="btn btn-outline btn-sm" onclick="setPeriodo('hoje')">📅 Hoje</button>
        <button class="btn btn-outline btn-sm" onclick="setPeriodo('7dias')">7d</button>
        <button class="btn btn-outline btn-sm" onclick="setPeriodo('mes')">Mês</button>
        <button class="btn btn-gold btn-sm" onclick="atualizarBusca()">🔍 Buscar</button>
        <button class="btn btn-outline btn-sm" onclick="limparBusca()">✖️</button>
    </div>
    <div class="busca-row">
        <select id="busca-mes" onchange="aplicarMes()">
            <option value="">Mês...</option>
            <option value="2026-01">Jan/2026</option><option value="2026-02">Fev/2026</option>
            <option value="2026-03">Mar/2026</option><option value="2026-04">Abr/2026</option>
            <option value="2026-05">Mai/2026</option><option value="2026-06">Jun/2026</option>
        </select>
        <div class="checkbox-group">
            <label><input type="checkbox" class="dia-semana" value="0"> Dom</label>
            <label><input type="checkbox" class="dia-semana" value="1"> Seg</label>
            <label><input type="checkbox" class="dia-semana" value="2"> Ter</label>
            <label><input type="checkbox" class="dia-semana" value="3"> Qua</label>
            <label><input type="checkbox" class="dia-semana" value="4"> Qui</label>
            <label><input type="checkbox" class="dia-semana" value="5"> Sex</label>
            <label><input type="checkbox" class="dia-semana" value="6"> Sáb</label>
        </div>
    </div>
    <div class="busca-row" style="border-top:1px solid #333; padding-top:6px;">
        <label style="font-size:11px; color:#aaa;">Comparar período:</label>
        <input type="date" id="comp-inicio" placeholder="De">
        <input type="date" id="comp-fim" placeholder="Até">
        <button class="btn btn-outline btn-sm" onclick="atualizarBusca()">Comparar</button>
    </div>
</div>
<div id="busca-resultado"></div>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyBNACpsgB4XFn2FuiRQbG0Nbd-958aAKbI",
    authDomain: "ligeirinho-s.firebaseapp.com",
    projectId: "ligeirinho-s",
    storageBucket: "ligeirinho-s.firebasestorage.app",
    messagingSenderId: "10630838120",
    appId: "1:10630838120:web:7194dfdad262b5c9a288dd"
});
const db = firebase.firestore();
const H = ['7h','8h','9h','10h','11h','12h','13h','14h','15h','16h','17h','18h','19h','20h','21h','22h'];
const DIAS_SEMANA = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const TURNOS = {
    'manha': { label: '🌅 Manhã', indices: [0,1,2,3], cor: '#f59e0b' },
    'almoco': { label: '☀️ Almoço', indices: [4,5,6], cor: '#ef4444' },
    'tarde': { label: '🌤️ Tarde', indices: [7,8,9,10], cor: '#3b82f6' },
    'noite': { label: '🌙 Noite', indices: [11,12,13,14,15], cor: '#8b5cf6' }
};
let listaE=[], listaR=[], dadosE={}, dadosR={}, inativosE=[], inativosR=[];
let chartHora=null, chartDia=null;

function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseData(s){ const p=s.split('-'); return new Date(p[0],p[1]-1,p[2]); }

async function fbLoad(col){ try{ const snap=await db.collection(col).doc('dados').get(); if(snap.exists){const d=snap.data(); localStorage.setItem(`fb_${col}_dados`,JSON.stringify(d)); return d;} }catch(e){} const c=localStorage.getItem(`fb_${col}_dados`); return c?JSON.parse(c):null; }

function temEntregaNoTurno(fonte, nome, di, df, turnoKey){
    const indices = turnoKey === 'todos' ? null : TURNOS[turnoKey].indices;
    const datas = Object.keys(fonte).filter(d => (!di || d>=di) && (!df || d<=df));
    for(let data of datas){
        const dia = fonte[data];
        if(dia && dia[nome]){
            const arr = dia[nome];
            if(indices === null){
                if(arr.reduce((a,b)=>a+b,0) > 0) return true;
            } else {
                for(let idx of indices){
                    if(arr[idx] > 0) return true;
                }
            }
        }
    }
    return false;
}

async function prepararBusca(){
    const fbE=await fbLoad('entregadores'); if(fbE){listaE=fbE.lista||[]; dadosE=fbE.dados||{}; inativosE=fbE.inativos||[];}
    const fbR=await fbLoad('restaurantes'); if(fbR){listaR=fbR.lista||[]; dadosR=fbR.dados||{}; inativosR=fbR.inativos||[];}
    const tipo=document.getElementById('busca-tipo').value;
    const incluir=document.getElementById('incluir-inativos').checked;
    const turno=document.getElementById('busca-turno').value;
    const di=document.getElementById('busca-inicio').value;
    const df=document.getElementById('busca-fim').value;
    const select=document.getElementById('busca-nome');
    select.innerHTML='<option value="">Selecione...</option>';
    let lista = tipo==='entregador' ? listaE : listaR;
    let inativos = tipo==='entregador' ? inativosE : inativosR;
    let todos = [...lista];
    if(incluir) todos = [...todos, ...inativos];
    const fonte = tipo==='entregador' ? dadosE : dadosR;
    if(turno !== 'todos'){
        todos = todos.filter(nome => temEntregaNoTurno(fonte, nome, di, df, turno));
    }
    todos.sort().forEach(n=>select.innerHTML+=`<option value="${n}">${n}</option>`);
    atualizarBusca();
}

function setPeriodo(tipo){
    const hoje=new Date();
    const inicio=document.getElementById('busca-inicio');
    const fim=document.getElementById('busca-fim');
    if(tipo==='hoje'){ inicio.value=fmt(hoje); fim.value=fmt(hoje); }
    else if(tipo==='7dias'){ const d=new Date(hoje); d.setDate(d.getDate()-6); inicio.value=fmt(d); fim.value=fmt(hoje); }
    else if(tipo==='mes'){ const d=new Date(hoje); d.setDate(1); inicio.value=fmt(d); fim.value=fmt(hoje); }
    prepararBusca();
}
function aplicarMes(){
    const val=document.getElementById('busca-mes').value;
    if(!val)return;
    const [ano,mes]=val.split('-').map(Number);
    const inicio=new Date(ano,mes-1,1);
    const fim=new Date(ano,mes,0);
    document.getElementById('busca-inicio').value=fmt(inicio);
    document.getElementById('busca-fim').value=fmt(fim);
    prepararBusca();
}
function limparBusca(){
    document.getElementById('busca-inicio').value='';
    document.getElementById('busca-fim').value='';
    document.getElementById('busca-nome').value='';
    document.getElementById('busca-resultado').innerHTML='';
    document.getElementById('comp-inicio').value='';
    document.getElementById('comp-fim').value='';
    if(chartHora){chartHora.destroy(); chartHora=null;}
    if(chartDia){chartDia.destroy(); chartDia=null;}
}

function getDiasSemanaSelecionados(){
    const cbs=document.querySelectorAll('.dia-semana:checked');
    return Array.from(cbs).map(cb=>parseInt(cb.value));
}

function calcularEstatisticas(fonte, nome, di, df, diasSemana, turnoKey){
    const indices = turnoKey === 'todos' ? null : TURNOS[turnoKey].indices;
    let totalGeral=0, totalPeriodo=0, totalComp=0;
    const porHora=new Array(16).fill(0), porDiaSemana=new Array(7).fill(0);
    const porHoraComp=new Array(16).fill(0), porDiaSemanaComp=new Array(7).fill(0);
    const turnos={};
    Object.keys(TURNOS).forEach(t=>{turnos[t]=0;});
    let ultimaEntrega=null, diasComEntrega=0;
    const datas=Object.keys(fonte).sort();
    const compInicio=document.getElementById('comp-inicio').value;
    const compFim=document.getElementById('comp-fim').value;

    datas.forEach(data=>{
        const dia=fonte[data];
        if(!dia || !dia[nome]) return;
        let val = 0;
        if(indices === null){
            val = dia[nome].reduce((a,b)=>a+b,0);
        } else {
            for(let idx of indices) val += (dia[nome][idx]||0);
        }
        if(val === 0) return;
        totalGeral += val;
        diasComEntrega++;
        if(!ultimaEntrega || data>ultimaEntrega) ultimaEntrega=data;
        const [a,m,d]=data.split('-').map(Number);
        const diaSem=new Date(a,m-1,d).getDay();
        if(diasSemana.length>0 && !diasSemana.includes(diaSem)) return;

        if((!di || data>=di) && (!df || data<=df)){
            totalPeriodo += val;
            porDiaSemana[diaSem] += val;
            if(indices === null){
                dia[nome].forEach((v,i)=>{
                    porHora[i] += v;
                    Object.keys(TURNOS).forEach(tk=>{
                        if(TURNOS[tk].indices.includes(i)) turnos[tk] += v;
                    });
                });
            } else {
                for(let idx of indices){
                    porHora[idx] += dia[nome][idx];
                    turnos[turnoKey] += dia[nome][idx];
                }
            }
        }
        if(compInicio && compFim && data>=compInicio && data<=compFim){
            totalComp += val;
            porDiaSemanaComp[diaSem] += val;
            if(indices === null){
                dia[nome].forEach((v,i)=>{
                    porHoraComp[i] += v;
                });
            } else {
                for(let idx of indices){
                    porHoraComp[idx] += dia[nome][idx];
                }
            }
        }
    });

    const mediaGeral = diasComEntrega>0 ? (totalGeral/diasComEntrega).toFixed(1) : 0;
    let melhorTurno = turnoKey;
    if(turnoKey === 'todos'){
        const entries = Object.entries(turnos).sort((a,b)=>b[1]-a[1]);
        melhorTurno = entries.length>0 ? entries[0][0] : 'nenhum';
    }
    const melhorHora = porHora.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v)[0];
    const melhorHoraLabel = melhorHora && melhorHora.v>0 ? H[melhorHora.i] : '-';

    return {
        totalGeral, totalPeriodo, totalComp,
        porHora, porDiaSemana, porHoraComp, porDiaSemanaComp,
        turnos,
        ultimaEntrega, diasComEntrega, mediaGeral,
        melhorTurno, melhorHora: melhorHoraLabel
    };
}

function atualizarBusca(){
    const tipo=document.getElementById('busca-tipo').value;
    const nome=document.getElementById('busca-nome').value;
    const di=document.getElementById('busca-inicio').value;
    const df=document.getElementById('busca-fim').value;
    const turnoKey=document.getElementById('busca-turno').value;
    const diasSemana=getDiasSemanaSelecionados();
    if(!nome){document.getElementById('busca-resultado').innerHTML='<div class="empty-state">🔍 Selecione um nome para buscar</div>';return;}
    const fonte=tipo==='entregador'?dadosE:dadosR;
    const label=tipo==='entregador'?'Entregador':'Estabelecimento';

    const stats = calcularEstatisticas(fonte, nome, di, df, diasSemana, turnoKey);
    const {totalGeral, totalPeriodo, totalComp, porHora, porDiaSemana, porHoraComp, porDiaSemanaComp, turnos, ultimaEntrega, diasComEntrega, mediaGeral, melhorTurno, melhorHora} = stats;

    // Tendência
    let tendencia='flat', variacao=0;
    if(diasComEntrega>7){
        const datas=Object.keys(fonte).filter(d=>{
            const dia=fonte[d];
            if(!dia || !dia[nome]) return false;
            let val=0;
            const indices=turnoKey==='todos'?null:TURNOS[turnoKey].indices;
            if(indices===null) val=dia[nome].reduce((a,b)=>a+b,0);
            else for(let idx of indices) val += (dia[nome][idx]||0);
            return val>0;
        }).sort();
        const ultimas=datas.slice(-7);
        const anteriores=datas.slice(-14,-7);
        const somaUlt=ultimas.reduce((s,d)=>{
            const dia=fonte[d];
            let val=0;
            const indices=turnoKey==='todos'?null:TURNOS[turnoKey].indices;
            if(indices===null) val=dia[nome].reduce((a,b)=>a+b,0);
            else for(let idx of indices) val += (dia[nome][idx]||0);
            return s+val;
        },0);
        const somaAnt=anteriores.reduce((s,d)=>{
            const dia=fonte[d];
            let val=0;
            const indices=turnoKey==='todos'?null:TURNOS[turnoKey].indices;
            if(indices===null) val=dia[nome].reduce((a,b)=>a+b,0);
            else for(let idx of indices) val += (dia[nome][idx]||0);
            return s+val;
        },0);
        if(somaAnt>0){ variacao = ((somaUlt - somaAnt)/somaAnt*100); tendencia = variacao>5?'up':variacao<-5?'down':'flat'; }
    }

    let html = `<div class="section-title">🔍 ${label}: <span style="color:#fff;">${nome}</span> <span class="small">${di||'início'} - ${df||'fim'}</span>`;
    if(turnoKey!=='todos') html += ` <span class="small" style="color:${TURNOS[turnoKey].cor};">${TURNOS[turnoKey].label}</span>`;
    html += `</div>`;

    // Cards
    html += `<div class="grid-4">
        <div class="mini-card"><div class="value">${totalPeriodo}</div><div class="label">No Período</div></div>
        <div class="mini-card"><div class="value">${totalGeral}</div><div class="label">Total Geral</div></div>
        <div class="mini-card"><div class="value">${mediaGeral}</div><div class="label">Média/Dia Trab.</div></div>
        <div class="mini-card"><div class="value">${ultimaEntrega?ultimaEntrega.split('-').reverse().join('/'):'Nunca'}</div><div class="label">Última Entrega</div></div>
    </div>`;
    html += `<div class="grid-4">
        <div class="mini-card" style="border-left:4px solid #FFD700;"><div class="value">${TURNOS[melhorTurno]?.label || melhorTurno}</div><div class="label">Melhor Turno</div></div>
        <div class="mini-card" style="border-left:4px solid #22c55e;"><div class="value">${melhorHora}</div><div class="label">Melhor Horário</div></div>
        <div class="mini-card"><div class="value">${diasComEntrega}</div><div class="label">Dias com Entrega</div></div>
        <div class="mini-card"><div class="value">${tendencia==='up'?'📈':tendencia==='down'?'📉':'➖'} ${variacao.toFixed(0)}%</div><div class="label">Tendência (7 dias)</div></div>
    </div>`;

    // Comparação
    if(totalComp>0){
        html += `<div class="section-title">📊 Comparação com período anterior</div>
        <div class="grid-2">
            <div class="mini-card" style="border-left:4px solid #3b82f6;"><div class="value">${totalPeriodo}</div><div class="label">Período atual</div></div>
            <div class="mini-card" style="border-left:4px solid #f59e0b;"><div class="value">${totalComp}</div><div class="label">Período comparado</div></div>
        </div>`;
        const dif = totalPeriodo - totalComp;
        const pct = totalComp>0 ? (dif/totalComp*100).toFixed(1) : '∞';
        html += `<div class="comparacao">🔄 Variação: <strong style="color:${dif>=0?'#22c55e':'#dc2626'};">${dif>=0?'+':''}${dif} (${pct}%)</strong></div>`;
    }

    // Por hora
    html += `<div class="section-title">📊 Por Horário</div>`;
    let horasMostrar = H;
    if(turnoKey!=='todos'){
        horasMostrar = TURNOS[turnoKey].indices.map(i=>H[i]);
    }
    html += `<div class="table-wrap"><table><thead><tr><th>Hora</th>`;
    horasMostrar.forEach(h=>html+=`<th>${h}</th>`);
    html+=`<th>Tot</th></tr></thead><tbody><tr><td><strong>Total</strong></td>`;
    let somaHora=0;
    if(turnoKey==='todos'){
        porHora.forEach(v=>{html+=`<td>${v||'-'}</td>`; somaHora+=v;});
    } else {
        TURNOS[turnoKey].indices.forEach(idx=>{html+=`<td>${porHora[idx]||'-'}</td>`; somaHora+=porHora[idx]||0;});
    }
    html+=`<td class="total-col">${somaHora}</td></tr></tbody></table></div>`;

    html += `<div class="chart-container"><canvas id="chartHora" height="80"></canvas></div>`;

    // Dia da semana
    html += `<div class="section-title">📅 Por Dia da Semana</div>`;
    html += `<div class="table-wrap"><table><thead><tr>`;
    DIAS_SEMANA.forEach(d=>html+=`<th>${d}</th>`);
    html+=`<th>Tot</th></tr></thead><tbody><tr>`;
    let somaDia=0;
    porDiaSemana.forEach(v=>{html+=`<td>${v||'-'}</td>`; somaDia+=v;});
    html+=`<td class="total-col">${somaDia}</td></tr></tbody></table></div>`;
    html += `<div class="chart-container"><canvas id="chartDia" height="80"></canvas></div>`;

    // Turnos
    html += `<div class="section-title">🕐 Por Turno (período)</div><div class="grid-4">`;
    Object.entries(turnos).forEach(([tk, v])=>{
        const pct = totalPeriodo>0 ? (v/totalPeriodo*100).toFixed(1) : 0;
        const destaque = tk === turnoKey ? 'border:2px solid #FFD700;' : '';
        html += `<div class="mini-card" style="border-left:4px solid ${TURNOS[tk].cor}; ${destaque}"><div class="value">${v}</div><div class="label">${TURNOS[tk].label} (${pct}%)</div></div>`;
    });
    html += `</div>`;

    // ============ RANKING TOP 20 (MELHORADO) ============
    html += `<div class="section-title">🏆 Top 20 ${tipo==='entregador' ? 'Estabelecimentos' : 'Entregadores'} que mais atuaram com <span style="color:#fff;">${nome}</span></div>`;
    const ranking = {};
    const datasFiltradas = Object.keys(fonte).filter(d=> (!di || d>=di) && (!df || d<=df));
    const indicesTurno = turnoKey === 'todos' ? null : TURNOS[turnoKey].indices;
    
    datasFiltradas.forEach(data=>{
        const dia = fonte[data];
        if(!dia) return;
        Object.entries(dia).forEach(([nome2, arr])=>{
            if(nome2 === nome) return; // exclui o próprio
            let total = 0;
            if(indicesTurno === null){
                total = arr.reduce((a,b)=>a+b,0);
            } else {
                for(let idx of indicesTurno) total += (arr[idx]||0);
            }
            if(total > 0) {
                ranking[nome2] = (ranking[nome2]||0) + total;
            }
        });
    });
    
    const rank = Object.entries(ranking).sort((a,b)=>b[1]-a[1]).slice(0,20);
    if(rank.length > 0){
        html += `<div class="table-wrap"><table><thead><tr><th>#</th><th>${tipo==='entregador'?'Estabelecimento':'Entregador'}</th><th>Total</th></tr></thead><tbody>`;
        rank.forEach(([n,t], i)=>{
            const medalha = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `${i+1}º`;
            html += `<tr><td>${medalha}</td><td>${n}</td><td style="color:#FFD700;font-weight:bold;">${t}</td></tr>`;
        });
        html += `</tbody></table></div>`;
    } else {
        html += `<div class="empty-state">Sem dados para ranking neste período/turno.</div>`;
    }

    // Previsão
    const hoje = new Date();
    let proximo = 'não identificado';
    for(let i=1;i<=7;i++){
        const d = new Date(hoje);
        d.setDate(d.getDate()+i);
        const ds = fmt(d);
        const dia = fonte[ds];
        if(dia && dia[nome]){
            let val=0;
            if(turnoKey==='todos') val = dia[nome].reduce((a,b)=>a+b,0);
            else for(let idx of TURNOS[turnoKey].indices) val += (dia[nome][idx]||0);
            if(val>0){ proximo = ds.split('-').reverse().join('/'); break; }
        }
    }
    html += `<div class="section-title">📅 Previsão <span class="small">próximo dia com entrega</span></div>
        <div class="mini-card" style="border-left:4px solid #8b5cf6;"><div class="value">${proximo}</div><div class="label">Baseado no histórico</div></div>`;

    document.getElementById('busca-resultado').innerHTML = html;

    // Gráficos
    setTimeout(()=>{
        if(chartHora){ chartHora.destroy(); chartHora=null; }
        if(chartDia){ chartDia.destroy(); chartDia=null; }
        const ctxHora = document.getElementById('chartHora');
        const ctxDia = document.getElementById('chartDia');
        if(ctxHora){
            let labels = H, data = porHora;
            if(turnoKey!=='todos'){
                labels = TURNOS[turnoKey].indices.map(i=>H[i]);
                data = TURNOS[turnoKey].indices.map(i=>porHora[i]);
            }
            chartHora = new Chart(ctxHora, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Entregas', data: data, backgroundColor: '#FFD700', borderRadius: 4 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#aaa', stepSize: 1 } }, x: { ticks: { color: '#aaa', maxRotation: 0 } } } }
            });
        }
        if(ctxDia){
            chartDia = new Chart(ctxDia, {
                type: 'bar',
                data: { labels: DIAS_SEMANA, datasets: [{ label: 'Entregas', data: porDiaSemana, backgroundColor: '#3b82f6', borderRadius: 4 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#aaa', stepSize: 1 } }, x: { ticks: { color: '#aaa' } } } }
            });
        }
    }, 100);
}

function exportarCSV(){
    const tipo=document.getElementById('busca-tipo').value;
    const nome=document.getElementById('busca-nome').value;
    if(!nome) return alert('Selecione um nome primeiro');
    const fonte=tipo==='entregador'?dadosE:dadosR;
    const di=document.getElementById('busca-inicio').value;
    const df=document.getElementById('busca-fim').value;
    const turnoKey=document.getElementById('busca-turno').value;
    const diasSemana=getDiasSemanaSelecionados();
    const stats = calcularEstatisticas(fonte, nome, di, df, diasSemana, turnoKey);
    let csv = "Hora,Total\n";
    if(turnoKey==='todos'){
        stats.porHora.forEach((v,i)=> csv += `${H[i]},${v}\n`);
    } else {
        TURNOS[turnoKey].indices.forEach(idx=> csv += `${H[idx]},${stats.porHora[idx]}\n`);
    }
    csv += "\nDia da Semana,Total\n";
    stats.porDiaSemana.forEach((v,i)=> csv += `${DIAS_SEMANA[i]},${v}\n`);
    csv += `\nTotal Período,${stats.totalPeriodo}\nTotal Geral,${stats.totalGeral}\nMédia,${stats.mediaGeral}\nÚltima Entrega,${stats.ultimaEntrega||'Nunca'}\nMelhor Turno,${stats.melhorTurno}`;
    const blob = new Blob([csv], {type: 'text/csv'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `busca_${nome}_${di||'todos'}.csv`;
    link.click();
}

    const mesAtual = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;
    document.getElementById('busca-mes').value = mesAtual;
};
