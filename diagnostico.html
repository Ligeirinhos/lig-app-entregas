<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 15px; }
        .log { margin: 5px 0; padding: 4px 8px; background: #2a2a2a; border-radius: 4px; font-size: 11px; }
        .ok { color: #4ade80; }
        .erro { color: #ef4444; }
    </style>
</head>
<body>
    <h1>🔍 Diagnóstico</h1>
    <div id="log"></div>

    <script>
        const logDiv = document.getElementById('log');
        function log(msg, tipo) {
            const div = document.createElement('div');
            div.className = 'log ' + (tipo || '');
            div.textContent = msg;
            logDiv.appendChild(div);
        }

        log('1. Iniciando Firebase...', 'ok');

        firebase.initializeApp({
            apiKey: "AIzaSyBNACpsgB4XFn2FuiRQbG0Nbd-958aAKbI",
            authDomain: "ligeirinho-s.firebaseapp.com",
            projectId: "ligeirinho-s",
            storageBucket: "ligeirinho-s.firebasestorage.app",
            messagingSenderId: "10630838120",
            appId: "1:10630838120:web:7194dfdad262b5c9a288dd"
        });
        const db = firebase.firestore();
        log('2. Firebase inicializado.', 'ok');

        async function testar() {
            log('3. Buscando dados...', 'ok');
            try {
                const snap = await db.collection('entregadores').doc('dados').get();
                if (snap.exists) {
                    const d = snap.data();
                    log(`4. Dados recebidos: ${d.lista ? d.lista.length : 0} entregadores, ${Object.keys(d.dados || {}).length} dias.`, 'ok');
                    // Tenta renderizar um mini dashboard
                    try {
                        const listaE = d.lista || [];
                        const dadosE = d.dados || {};
                        const H = ['7h','8h','9h','10h','11h','12h','13h','14h','15h','16h','17h','18h','19h','20h','21h','22h'];
                        const hoje = new Date();
                        const chave = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
                        const dia = dadosE[chave] || {};
                        let total = 0;
                        listaE.forEach(n => { if (dia[n]) total += dia[n].reduce((a,b)=>a+b,0); });
                        log(`5. Renderização de teste: ${listaE.length} entregadores, total hoje = ${total}.`, 'ok');
                    } catch(e) {
                        log('5. Erro na renderização: ' + e.message, 'erro');
                    }
                } else {
                    log('4. Documento não encontrado.', 'erro');
                }
            } catch(e) {
                log('3. Erro ao buscar dados: ' + e.message, 'erro');
            }
            log('6. Fim do diagnóstico.', 'ok');
        }

        testar();
    </script>
</body>
</html>
