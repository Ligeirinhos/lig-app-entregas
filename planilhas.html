<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ligeirinho's Cadastro">
    <title>📋 Cadastro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a1a'/><text x='50' y='65' text-anchor='middle' font-size='60'>📋</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a1a'/><text x='50' y='65' text-anchor='middle' font-size='60'>📋</text></svg>">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .header { background: #1a1a1a; border-bottom: 2px solid #FFD700; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; color: #FFD700; }
        .tabs { display: flex; gap: 4px; margin: 10px 0; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #2a2a2a; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; border: 2px solid transparent; }
        .tab.active { border-color: #FFD700; color: #FFD700; }
        .content { padding: 8px; display: none; }
        .content.active { display: block; }
        .btn { padding: 7px 12px; border-radius: 18px; font-weight: 600; cursor: pointer; font-size: 10px; border: none; white-space: nowrap; font-family: inherit; }
        .btn-gold { background: #FFD700; color: #1a1a1a; }
        .btn-outline { background: transparent; border: 2px solid #FFD700; color: #FFD700; }
        .btn-sm { padding: 4px 8px; font-size: 9px; }
        .btn-danger { background: #dc2626; color: #fff; border: none; }
        .btn-edit { background: #3b82f6; color: #fff; border: none; }
        .btn-xs { padding: 2px 6px; font-size: 8px; border-radius: 10px; }
        .input-row { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
        .input-row input { background: #1a1a1a; border: 2px solid #444; border-radius: 6px; padding: 6px; color: #fff; font-size: 11px; flex: 1; min-width: 100px; }
        .lista-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #2a2a2a; border-radius: 6px; margin-bottom: 4px; border: 1px solid #333; }
        .lista-item .nome { font-weight: bold; font-size: 13px; }
        .lista-item .actions { display: flex; gap: 4px; }
        .inativo { opacity: 0.5; background: #1a1a1a; border-color: #555; }
        .inativo .nome { color: #888; text-decoration: line-through; }
        .section-title { color: #FFD700; margin: 12px 0 6px; font-weight: bold; border-bottom: 1px solid #FFD700; padding-bottom: 4px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .empty-state { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>
<div class="header"><h1>📋 Cadastro</h1></div>
<div class="tabs">
    <div class="tab active" onclick="mudarAba('entr')">👤 Entregadores</div>
    <div class="tab" onclick="mudarAba('rest')">🏪 Estabelecimentos</div>
</div>

<div class="content active" id="aba-entr">
    <div class="input-row">
        <input type="text" id="novo-entr" placeholder="Nome do entregador...">
        <button class="btn btn-gold btn-sm" onclick="addEntr()">➕ Adicionar</button>
        <button class="btn btn-outline btn-sm" onclick="toggleInativos('entr')">👻 Inativos</button>
    </div>
    <div id="lista-entr"></div>
    <div id="inativos-entr" style="margin-top:8px; display:none;"></div>
</div>

<div class="content" id="aba-rest">
    <div class="input-row">
        <input type="text" id="novo-rest" placeholder="Nome do estabelecimento...">
        <button class="btn btn-gold btn-sm" onclick="addRest()">➕ Adicionar</button>
        <button class="btn btn-outline btn-sm" onclick="toggleInativos('rest')">👻 Inativos</button>
    </div>
    <div id="lista-rest"></div>
    <div id="inativos-rest" style="margin-top:8px; display:none;"></div>
</div>

<script>
// ============ FIREBASE ============
firebase.initializeApp({
    apiKey: "AIzaSyBNACpsgB4XFn2FuiRQbG0Nbd-958aAKbI", authDomain: "ligeirinho-s.firebaseapp.com", projectId: "ligeirinho-s", storageBucket: "ligeirinho-s.firebasestorage.app", messagingSenderId: "10630838120", appId: "1:10630838120:web:7194dfdad262b5c9a288dd"
});
const db = firebase.firestore();

// ============ DADOS ============
let listaE = [], listaR = [], inativosE = [], inativosR = [], logE = [];
let mostrarInativosE = false, mostrarInativosR = false;
let online = navigator.onLine;

function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

async function fbSave(col, doc, data){
    localStorage.setItem(`fb_${col}_${doc}`, JSON.stringify(data));
    if(!online) return;
    try{ await db.collection(col).doc(doc).set(data, {merge:true}); } catch(e){}
}
async function fbLoad(col){
    if(online){
        try{
            const snap = await db.collection(col).doc('dados').get();
            if(snap.exists){
                const d = snap.data();
                localStorage.setItem(`fb_${col}_dados`, JSON.stringify(d));
                return d;
            }
        } catch(e){}
    }
    const c = localStorage.getItem(`fb_${col}_dados`);
    return c ? JSON.parse(c) : null;
}

window.addEventListener('online', ()=>{ online=true; });
window.addEventListener('offline', ()=>{ online=false; });

// ============ TABS ============
function mudarAba(t){
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
    document.getElementById('aba-'+t).classList.add('active');
    document.querySelectorAll('.tab')[t==='entr'?0:1].classList.add('active');
    if(t==='entr') renderLista('entr');
    else renderLista('rest');
}

function toggleInativos(tipo){
    if(tipo==='entr'){
        mostrarInativosE = !mostrarInativosE;
        document.getElementById('inativos-entr').style.display = mostrarInativosE ? 'block' : 'none';
        renderInativos('entr');
    } else {
        mostrarInativosR = !mostrarInativosR;
        document.getElementById('inativos-rest').style.display = mostrarInativosR ? 'block' : 'none';
        renderInativos('rest');
    }
}

// ============ RENDER LISTAS ============
function renderLista(tipo){
    const lista = tipo==='entr' ? listaE : listaR;
    const inativos = tipo==='entr' ? inativosE : inativosR;
    const container = document.getElementById(tipo==='entr' ? 'lista-entr' : 'lista-rest');
    const ativos = lista.filter(n => !inativos.includes(n)).sort();
    if(ativos.length === 0){
        container.innerHTML = '<div class="empty-state">Nenhum nome cadastrado.</div>';
        return;
    }
    let html = '';
    ativos.forEach(nome => {
        html += `<div class="lista-item">
            <span class="nome">${nome}</span>
            <div class="actions">
                <button class="btn btn-edit btn-xs" onclick="editarNome('${tipo}','${nome}')">✏️</button>
                <button class="btn btn-outline btn-xs" onclick="inativar('${tipo}','${nome}')">💤</button>
                <button class="btn btn-danger btn-xs" onclick="excluir('${tipo}','${nome}')">🗑️</button>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

function renderInativos(tipo){
    const inativos = tipo==='entr' ? inativosE : inativosR;
    const container = document.getElementById(tipo==='entr' ? 'inativos-entr' : 'inativos-rest');
    if(inativos.length === 0){
        container.innerHTML = '<div class="empty-state">Nenhum inativo.</div>';
        return;
    }
    let html = '<div class="section-title">👻 Inativos</div>';
    inativos.sort().forEach(nome => {
        html += `<div class="lista-item inativo">
            <span class="nome">${nome}</span>
            <div class="actions">
                <button class="btn btn-edit btn-xs" onclick="reativar('${tipo}','${nome}')">🔄 Reativar</button>
                <button class="btn btn-danger btn-xs" onclick="excluir('${tipo}','${nome}')">🗑️</button>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

// ============ AÇÕES ============
async function addEntr(){
    const nome = document.getElementById('novo-entr').value.trim();
    if(!nome) return;
    if(listaE.includes(nome) || inativosE.includes(nome)){
        alert('Este nome já existe.');
        return;
    }
    listaE.push(nome);
    document.getElementById('novo-entr').value = '';
    await fbSave('entregadores','dados',{lista:listaE, inativos:inativosE, ts:Date.now()});
    renderLista('entr');
}
async function addRest(){
    const nome = document.getElementById('novo-rest').value.trim();
    if(!nome) return;
    if(listaR.includes(nome) || inativosR.includes(nome)){
        alert('Este nome já existe.');
        return;
    }
    listaR.push(nome);
    document.getElementById('novo-rest').value = '';
    await fbSave('restaurantes','dados',{lista:listaR, inativos:inativosR, ts:Date.now()});
    renderLista('rest');
}

async function editarNome(tipo, nomeAntigo){
    const novo = prompt(`Editar "${nomeAntigo}"`, nomeAntigo);
    if(!novo || novo.trim() === nomeAntigo) return;
    const novoTrim = novo.trim();
    const lista = tipo==='entr' ? listaE : listaR;
    const inativos = tipo==='entr' ? inativosE : inativosR;
    if(lista.includes(novoTrim) || inativos.includes(novoTrim)){
        alert('Este nome já existe.');
        return;
    }
    if(!confirm(`Alterar "${nomeAntigo}" para "${novoTrim}"?`)) return;
    const idx = lista.indexOf(nomeAntigo);
    if(idx !== -1) lista[idx] = novoTrim;
    // Se estiver nos inativos, também renomeia
    const idxIna = inativos.indexOf(nomeAntigo);
    if(idxIna !== -1) inativos[idxIna] = novoTrim;
    // Atualiza o log: renomeia o campo correspondente
    const campo = tipo==='entr' ? 'entregador' : 'restaurante';
    logE.forEach(entry => {
        if(entry[campo] === nomeAntigo) entry[campo] = novoTrim;
    });
    // Salva
    await fbSave(tipo==='entr' ? 'entregadores' : 'restaurantes', 'dados', {lista: lista, inativos: inativos, ts:Date.now()});
    await fbSave('log_entregas','dados',{dados:logE, ts:Date.now()});
    renderLista(tipo);
    if(tipo==='entr') renderInativos('entr');
    else renderInativos('rest');
}

async function inativar(tipo, nome){
    if(!confirm(`Inativar "${nome}"?`)) return;
    const lista = tipo==='entr' ? listaE : listaR;
    const inativos = tipo==='entr' ? inativosE : inativosR;
    if(inativos.includes(nome)) return;
    const idx = lista.indexOf(nome);
    if(idx !== -1) lista.splice(idx, 1);
    inativos.push(nome);
    await fbSave(tipo==='entr' ? 'entregadores' : 'restaurantes', 'dados', {lista: lista, inativos: inativos, ts:Date.now()});
    renderLista(tipo);
    renderInativos(tipo);
}

async function reativar(tipo, nome){
    if(!confirm(`Reativar "${nome}"?`)) return;
    const lista = tipo==='entr' ? listaE : listaR;
    const inativos = tipo==='entr' ? inativosE : inativosR;
    const idx = inativos.indexOf(nome);
    if(idx === -1) return;
    inativos.splice(idx, 1);
    lista.push(nome);
    await fbSave(tipo==='entr' ? 'entregadores' : 'restaurantes', 'dados', {lista: lista, inativos: inativos, ts:Date.now()});
    renderLista(tipo);
    renderInativos(tipo);
}

async function excluir(tipo, nome){
    if(!confirm(`Excluir "${nome}" permanentemente?`)) return;
    const lista = tipo==='entr' ? listaE : listaR;
    const inativos = tipo==='entr' ? inativosE : inativosR;
    // Verifica se há registros no log
    const campo = tipo==='entr' ? 'entregador' : 'restaurante';
    const temRegistros = logE.some(entry => entry[campo] === nome);
    let transferir = false;
    if(temRegistros){
        if(!confirm(`"${nome}" tem entregas registradas. Deseja transferir os registros para "Outros"?`)) return;
        transferir = true;
    }
    // Remove das listas
    const idx = lista.indexOf(nome);
    if(idx !== -1) lista.splice(idx, 1);
    const idxIna = inativos.indexOf(nome);
    if(idxIna !== -1) inativos.splice(idxIna, 1);
    // Se transferir, renomeia no log
    if(transferir){
        const novoNome = tipo==='entr' ? 'Outros (entregador)' : 'Outros (estabelecimento)';
        // Garante que "Outros" esteja na lista ativa
        if(!lista.includes(novoNome) && !inativos.includes(novoNome)){
            lista.push(novoNome);
        }
        logE.forEach(entry => {
            if(entry[campo] === nome) entry[campo] = novoNome;
        });
        await fbSave('log_entregas','dados',{dados:logE, ts:Date.now()});
    } else {
        // Se não transferir, apenas remove do log (opcional, mas mantemos para manter consistência)
        logE = logE.filter(entry => entry[campo] !== nome);
        await fbSave('log_entregas','dados',{dados:logE, ts:Date.now()});
    }
    await fbSave(tipo==='entr' ? 'entregadores' : 'restaurantes', 'dados', {lista: lista, inativos: inativos, ts:Date.now()});
    renderLista(tipo);
    renderInativos(tipo);
}

// ============ INIT ============
async function init(){
    const fbE = await fbLoad('entregadores');
    if(fbE){ listaE = fbE.lista || []; inativosE = fbE.inativos || []; }
    const fbR = await fbLoad('restaurantes');
    if(fbR){ listaR = fbR.lista || []; inativosR = fbR.inativos || []; }
    const fbL = await fbLoad('log_entregas');
    if(fbL){ logE = fbL.dados || []; }
    renderLista('entr');
    renderLista('rest');
    // Esconde inativos inicialmente
    document.getElementById('inativos-entr').style.display = 'none';
    document.getElementById('inativos-rest').style.display = 'none';
}
window.onload = init;
</script>
</body>
</html>
